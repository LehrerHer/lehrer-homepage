<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lernhelden – Rangliste</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="nav">
  <span class="nav-logo">Lern<span>helden</span></span>
  <a href="/profil">Profil</a>
  <a href="/quiz">Quizzes</a>
  <a href="/arbeitsblatt">Arbeitsblätter</a>
  <a href="/rangliste" class="active">Rangliste</a>
  <a href="/login" id="loginLink" style="display:none">Anmelden</a>
  <a href="#" class="btn-logout" id="logoutBtn" style="display:none">Abmelden</a>
</nav>

<div class="container-wide">
  <div class="page-header">
    <h1>🏆 Rangliste</h1>
    <p>Die besten Lernhelden auf einen Blick</p>
  </div>

  <div id="classFilter" class="mb-2 text-center" style="display:none">
    <label for="filterClass" style="font-weight:700;margin-right:0.5rem">Klasse:</label>
    <select id="filterClass" style="padding:0.4rem 0.8rem;border-radius:8px;border:2px solid #e2e8f0;font-family:inherit">
      <option value="">Alle Klassen</option>
    </select>
  </div>

  <div id="podium"></div>
  <div id="tableWrap" class="admin-table-wrap">
    <div class="loading">Rangliste wird geladen</div>
  </div>
</div>

<script src="/js/avatar.js"></script>
<script>
let allStudents = [];

async function checkAuth() {
  try {
    const res = await fetch('/api/auth/me');
    const data = await res.json();
    if (data.loggedIn) {
      document.getElementById('logoutBtn').style.display = '';
    } else {
      document.getElementById('loginLink').style.display = '';
    }
  } catch {}
}

function renderPodium(top3) {
  if (top3.length < 1) return;
  const order = [top3[1] || null, top3[0], top3[2] || null].filter(Boolean);
  const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };

  const slots = [top3[1] || null, top3[0], top3[2] || null];
  const el = document.getElementById('podium');
  el.className = 'podium';
  el.innerHTML = slots.map((s, i) => {
    if (!s) return '<div class="podium-slot"></div>';
    const actualRank = i === 0 ? 2 : i === 1 ? 1 : 3;
    return `
      <div class="podium-slot">
        <div class="avatar-wrapper avatar-sm" style="margin:0 auto 0.4rem">${drawAvatar(s.xp)}</div>
        <div class="podium-rank">${medals[actualRank]}</div>
        <div class="podium-nick">${s.nick}</div>
        <div class="podium-xp">${s.xp} XP</div>
        <div class="text-muted" style="font-size:0.75rem">${s.levelName}</div>
      </div>`;
  }).join('');
}

function renderTable(students) {
  const wrap = document.getElementById('tableWrap');
  if (!students.length) {
    wrap.innerHTML = '<p class="text-muted text-center" style="padding:2rem">Noch keine Schüler registriert.</p>';
    return;
  }
  wrap.innerHTML = `
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th style="width:50px">Rang</th>
          <th>Held</th>
          <th>Level</th>
          <th>XP</th>
          <th>Badges</th>
        </tr>
      </thead>
      <tbody>
        ${students.map((s, i) => `
          <tr>
            <td class="rank-num ${s.rank <= 3 ? 'rank-' + s.rank : ''}">${s.rank}</td>
            <td>
              <div class="nick-cell">
                <div class="avatar-wrapper avatar-xs">${drawAvatar(s.xp)}</div>
                ${s.nick}
              </div>
            </td>
            <td>
              <span style="font-weight:700;color:var(--c4)">${s.levelName}</span>
            </td>
            <td class="num" style="color:var(--c3);font-family:'Fredoka One',cursive">${s.xp}</td>
            <td>${s.badge_count}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

async function load() {
  try {
    const res = await fetch('/api/students/leaderboard');
    allStudents = await res.json();

    const classes = [...new Set(allStudents.filter(s => s.class).map(s => s.class))].sort();
    if (classes.length > 0) {
      const filterDiv = document.getElementById('classFilter');
      const sel = document.getElementById('filterClass');
      classes.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });
      filterDiv.style.display = '';
      sel.addEventListener('change', () => {
        const val = sel.value;
        const filtered = val ? allStudents.filter(s => s.class === val) : allStudents;
        renderPodium(filtered.slice(0, 3));
        renderTable(filtered);
      });
    }

    renderPodium(allStudents.slice(0, 3));
    renderTable(allStudents);
  } catch {
    document.getElementById('tableWrap').innerHTML = '<div class="alert alert-error">Fehler beim Laden der Rangliste.</div>';
  }
}

document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
});

checkAuth();
load();
</script>
</body>
</html>
