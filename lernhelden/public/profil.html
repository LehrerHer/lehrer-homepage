<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lerngladiatoren – Mein Profil</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="nav">
  <span class="nav-logo">Lern<span>gladiatoren</span></span>
  <a href="/profil" class="active">Profil</a>
  <a href="/quiz">Quizzes</a>
  <a href="/arbeitsblatt">Arbeitsblätter</a>
  <a href="/rangliste">Rangliste</a>
  <span class="nav-nick" id="navNick"></span>
  <a href="#" class="btn-logout" id="logoutBtn">Abmelden</a>
</nav>

<div class="container" id="app">
  <div class="loading">Profil wird geladen</div>
</div>

<div class="popup-overlay" id="popupOverlay"></div>

<script src="/js/avatar.js"></script>
<script>
const CONFETTI_COLORS = ['#FF6B6B','#FFE66D','#4ECDC4','#A78BFA','#68d391','#fc8181'];

function showXPPopup(amount) {
  const overlay = document.getElementById('popupOverlay');
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.innerHTML = `<div class="xp-popup-val">+${amount}</div><div class="xp-popup-label">XP verdient!</div>`;
  overlay.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

function showBadgePopup(badge, delay = 0) {
  setTimeout(() => {
    const overlay = document.getElementById('popupOverlay');
    const el = document.createElement('div');
    el.className = 'badge-popup';
    el.innerHTML = `
      <div class="badge-popup-icon">${badge.icon}</div>
      <div class="badge-popup-title">Neues Badge!</div>
      <div class="badge-popup-name">${badge.name}</div>
    `;
    overlay.appendChild(el);
    setTimeout(() => el.remove(), 3100);
  }, delay);
}

function showConfetti() {
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    el.style.width = (Math.random() * 8 + 6) + 'px';
    el.style.height = (Math.random() * 8 + 6) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    el.style.animationDuration = (Math.random() * 1.2 + 1.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

function formatDate(dt) {
  if (!dt) return '–';
  return new Date(dt).toLocaleDateString('de-DE');
}

async function loadProfile() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('/api/students/profile');
    if (res.status === 401) { window.location.href = '/login'; return; }
    const p = await res.json();

    document.getElementById('navNick').textContent = p.nick;

    // Check login badges from session storage
    const pending = sessionStorage.getItem('pendingBadges');
    if (pending) {
      sessionStorage.removeItem('pendingBadges');
      const badges = JSON.parse(pending);
      badges.forEach((b, i) => showBadgePopup(b, i * 800));
      if (badges.length > 0) showConfetti();
    }

    const nextXPText = p.nextLevelName
      ? `${p.currentXP} / ${p.rangeXP} XP bis ${p.nextLevelName}`
      : 'Maximales Level erreicht! 🏆';

    app.innerHTML = `
      <div class="profil-grid">
        <div>
          <div class="card avatar-card">
            <div class="avatar-wrapper" id="avatarMain"></div>
            <div class="nick-display">${p.nick}</div>
            <div class="level-badge">Level ${p.levelIndex + 1} – ${p.levelName}</div>
            <div class="xp-section">
              <div class="xp-total num">${p.xp} XP</div>
              <div class="xp-labels">
                <span>Level ${p.levelIndex + 1}</span>
                ${p.nextLevelName ? `<span>Level ${p.levelIndex + 2}</span>` : '<span>MAX</span>'}
              </div>
              <div class="xp-bar-track">
                <div class="xp-bar-fill" id="xpBar" style="width:0%"></div>
              </div>
              <p class="text-muted mt-1 text-center" style="font-size:0.8rem">${nextXPText}</p>
            </div>
            ${p.streak.current_streak > 0 ? `
              <div class="streak-widget" style="justify-content:center;margin-top:0.5rem">
                <span class="fire">🔥</span> ${p.streak.current_streak} Tage Streak
              </div>` : ''}
            <p class="text-muted mt-2" style="font-size:0.78rem">Dabei seit ${formatDate(p.created_at)}</p>
          </div>
        </div>

        <div>
          <div class="card mb-2">
            <div class="flex-between mb-1">
              <h2 style="font-size:1.2rem">Meine Badges</h2>
              <span class="text-muted">${p.badges.length} freigeschaltet</span>
            </div>
            ${p.badges.length ? `
              <div class="badges-grid">
                ${p.badges.map(b => `
                  <div class="badge-chip" title="${b.description} (${formatDate(b.earned_at)})">
                    <span class="badge-icon">${b.icon}</span> ${b.name}
                  </div>`).join('')}
              </div>` : '<p class="text-muted">Noch keine Badges – mach ein Quiz!</p>'}
          </div>

          <div class="card">
            <h2 style="font-size:1.2rem;margin-bottom:0.8rem">Letzte Aktivitäten</h2>
            ${p.recentXP.length ? `
              <ul class="xp-log-list">
                ${p.recentXP.map(e => `
                  <li class="xp-log-item">
                    <span>${e.reason || 'XP erhalten'}</span>
                    <span class="xp-amount ${e.amount >= 0 ? 'pos' : 'neg'}">${e.amount >= 0 ? '+' : ''}${e.amount} XP</span>
                  </li>`).join('')}
              </ul>` : '<p class="text-muted">Noch keine Aktivitäten.</p>'}
            <div class="mt-2">
              <a href="/quiz" class="btn btn-secondary" style="width:100%">Quiz machen → XP sammeln</a>
            </div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('avatarMain').innerHTML = drawAvatar(p.xp);
    requestAnimationFrame(() => {
      document.getElementById('xpBar').style.width = p.progressPct + '%';
    });

  } catch (err) {
    app.innerHTML = '<div class="alert alert-error">Fehler beim Laden des Profils.</div>';
  }
}

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
});

// Store login badges if present
const urlParams = new URLSearchParams(window.location.search);
loadProfile();
</script>
</body>
</html>
