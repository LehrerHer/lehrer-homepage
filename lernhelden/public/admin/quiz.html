<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lernhelden Admin – Quizzes</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="admin-nav">
  <span class="admin-logo">🛡️ Lernhelden Admin</span>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/schueler">Schüler</a>
  <a href="/admin/quiz" class="active">Quizzes</a>
  <a href="/admin/export">Export</a>
  <a href="#" id="logoutBtn" style="color:#ef4444!important">Abmelden</a>
</nav>

<div class="container-wide">
  <div class="flex-between mb-2" style="flex-wrap:wrap;gap:0.8rem">
    <h1 style="font-family:'Fredoka One',cursive;font-size:1.8rem">Quizzes verwalten</h1>
    <button class="btn btn-primary" onclick="showCreateForm()">+ Neues Quiz</button>
  </div>

  <div id="msg"></div>

  <!-- Quiz List -->
  <div id="quizList">
    <div class="loading">Quizzes werden geladen</div>
  </div>

  <!-- Create Form -->
  <div id="createForm" class="hidden">
    <div class="card">
      <div class="flex-between mb-2">
        <h2 style="font-size:1.3rem">Neues Quiz erstellen</h2>
        <button class="btn btn-ghost btn-sm" onclick="hideCreateForm()">Abbrechen</button>
      </div>

      <div id="createMsg"></div>

      <div class="form-group">
        <label>Quiz-Titel *</label>
        <input type="text" id="quizTitle" placeholder="z.B. Mathematik: Gleichungen">
      </div>
      <div class="form-group">
        <label>Fach</label>
        <input type="text" id="quizSubject" placeholder="z.B. Mathematik">
      </div>

      <div id="questionsContainer"></div>

      <button class="btn btn-ghost" style="width:100%;border-style:dashed;margin-bottom:1rem" onclick="addQuestion()">
        + Frage hinzufügen
      </button>

      <button class="btn btn-primary" style="width:100%" onclick="saveQuiz()">Quiz speichern</button>
    </div>
  </div>
</div>

<script>
let questionCount = 0;

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/auth/admin-logout', { method: 'POST' });
  window.location.href = '/admin';
});

function showCreateForm() {
  document.getElementById('createForm').classList.remove('hidden');
  document.getElementById('quizList').classList.add('hidden');
  questionCount = 0;
  document.getElementById('questionsContainer').innerHTML = '';
  document.getElementById('quizTitle').value = '';
  document.getElementById('quizSubject').value = '';
  addQuestion();
  document.getElementById('createForm').scrollIntoView({ behavior: 'smooth' });
}

function hideCreateForm() {
  document.getElementById('createForm').classList.add('hidden');
  document.getElementById('quizList').classList.remove('hidden');
}

function addQuestion() {
  questionCount++;
  const n = questionCount;
  const container = document.getElementById('questionsContainer');
  const div = document.createElement('div');
  div.className = 'question-builder';
  div.id = `q${n}`;
  div.innerHTML = `
    <div class="question-builder-header">
      <span>Frage ${n}</span>
      <button type="button" class="btn btn-sm btn-danger" onclick="removeQuestion(${n})">✕</button>
    </div>
    <div class="form-group" style="margin-bottom:0.6rem">
      <input type="text" id="q${n}_text" placeholder="Fragetext eingeben…" style="font-weight:700">
    </div>
    <p style="font-size:0.8rem;font-weight:700;margin-bottom:0.4rem;color:#666">Antworten (richtige markieren):</p>
    <div class="options-grid">
      ${[0,1,2,3].map(i => `
        <div class="option-row">
          <input type="radio" name="correct_${n}" value="${i}" id="r${n}_${i}" ${i===0?'checked':''}>
          <input type="text" id="q${n}_opt${i}" placeholder="Antwort ${String.fromCharCode(65+i)}">
        </div>`).join('')}
    </div>
    <div class="form-group mt-1" style="display:flex;align-items:center;gap:0.5rem">
      <label style="margin:0;white-space:nowrap">XP-Wert:</label>
      <input type="number" id="q${n}_xp" value="15" min="5" max="50" style="width:80px">
    </div>
  `;
  container.appendChild(div);
}

function removeQuestion(n) {
  const el = document.getElementById(`q${n}`);
  if (el) el.remove();
}

async function saveQuiz() {
  const msg = document.getElementById('createMsg');
  const title = document.getElementById('quizTitle').value.trim();
  const subject = document.getElementById('quizSubject').value.trim();

  if (!title) { msg.innerHTML = '<div class="alert alert-error">Bitte einen Titel eingeben.</div>'; return; }

  const questions = [];
  for (let n = 1; n <= questionCount; n++) {
    const qEl = document.getElementById(`q${n}`);
    if (!qEl) continue;
    const text = document.getElementById(`q${n}_text`)?.value.trim();
    if (!text) continue;
    const options = [0,1,2,3].map(i => document.getElementById(`q${n}_opt${i}`)?.value.trim() || '');
    if (options.some(o => !o)) { msg.innerHTML = `<div class="alert alert-error">Bitte alle Antwortoptionen bei Frage ${n} ausfüllen.</div>`; return; }
    const correct_index = parseInt(document.querySelector(`input[name="correct_${n}"]:checked`)?.value ?? 0);
    const xp_value = parseInt(document.getElementById(`q${n}_xp`)?.value ?? 15);
    questions.push({ text, options, correct_index, xp_value });
  }

  if (!questions.length) { msg.innerHTML = '<div class="alert alert-error">Mindestens eine vollständige Frage erforderlich.</div>'; return; }

  try {
    const res = await fetch('/api/admin/quiz', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, subject, questions }),
    });
    const data = await res.json();
    if (!res.ok) { msg.innerHTML = `<div class="alert alert-error">${data.error}</div>`; return; }
    msg.innerHTML = `<div class="alert alert-success">✓ Quiz "${title}" mit ${questions.length} Fragen gespeichert!</div>`;
    setTimeout(() => { hideCreateForm(); loadQuizzes(); }, 1500);
  } catch { msg.innerHTML = '<div class="alert alert-error">Serverfehler.</div>'; }
}

async function deleteQuiz(id, title) {
  if (!confirm(`Quiz "${title}" wirklich löschen?`)) return;
  const res = await fetch(`/api/admin/quiz/${id}`, { method: 'DELETE' });
  if (!res.ok) { alert('Fehler beim Löschen.'); return; }
  loadQuizzes();
}

async function loadQuizzes() {
  const list = document.getElementById('quizList');
  try {
    const res = await fetch('/api/admin/quiz');
    if (res.status === 401) { window.location.href = '/admin'; return; }
    const quizzes = await res.json();

    if (!quizzes.length) {
      list.innerHTML = '<p class="text-muted text-center" style="padding:1rem">Noch keine Quizzes. Erstelle dein erstes!</p>';
      return;
    }

    list.innerHTML = `
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr><th>Titel</th><th>Fach</th><th>Fragen</th><th>Erstellt</th><th>Aktionen</th></tr>
          </thead>
          <tbody>
            ${quizzes.map(q => `
              <tr>
                <td><strong>${q.title}</strong></td>
                <td>${q.subject || '–'}</td>
                <td>${q.question_count}</td>
                <td>${new Date(q.created_at).toLocaleDateString('de-DE')}</td>
                <td>
                  <button class="btn btn-sm btn-danger" onclick="deleteQuiz(${q.id},'${q.title.replace(/'/g,"\\'")}')">Löschen</button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="card mt-2">
        <h2 style="font-size:1.1rem;margin-bottom:0.8rem">Quiz-Ergebnisse (letzte 50)</h2>
        <div id="resultsTable"><div class="loading">Wird geladen</div></div>
      </div>
    `;
    loadResults();
  } catch {
    list.innerHTML = '<div class="alert alert-error">Fehler beim Laden.</div>';
  }
}

async function loadResults() {
  const el = document.getElementById('resultsTable');
  if (!el) return;
  try {
    const res = await fetch('/api/admin/results');
    const results = await res.json();
    if (!results.length) { el.innerHTML = '<p class="text-muted">Noch keine Ergebnisse.</p>'; return; }
    el.innerHTML = `
      <div style="overflow-x:auto">
        <table class="admin-table">
          <thead><tr><th>Schüler</th><th>Quiz</th><th>Score</th><th>XP</th><th>Versuch</th><th>Datum</th></tr></thead>
          <tbody>
            ${results.slice(0,50).map(r => `
              <tr>
                <td><strong>${r.nick}</strong></td>
                <td>${r.quiz_title}</td>
                <td>${r.score}/${r.total} (${Math.round(r.score/r.total*100)}%)</td>
                <td style="color:var(--c3);font-weight:800">+${r.xp_earned}</td>
                <td>${r.attempt_number}.</td>
                <td>${new Date(r.completed_at).toLocaleDateString('de-DE')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch {}
}

loadQuizzes();
</script>
</body>
</html>
