<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lerngladiatoren Admin – Quizzes & Arbeitsblätter</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="admin-nav">
  <span class="admin-logo">🛡️ Lerngladiatoren Admin</span>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/schueler">Gladiatoren</a>
  <a href="/admin/materialien">Materialien</a>
  <a href="/admin/quiz" class="active">Quizzes</a>
  <a href="/admin/export">Export</a>
  <a href="#" id="logoutBtn" style="color:#ef4444!important">Abmelden</a>
</nav>

<div class="container-wide">
  <div class="flex-between mb-2" style="flex-wrap:wrap;gap:0.8rem">
    <h1 style="font-family:'Fredoka One',cursive;font-size:1.8rem">Quizzes &amp; Arbeitsblätter</h1>
    <div style="display:flex;gap:0.6rem">
      <button class="btn btn-primary" onclick="showCreateForm('quiz')">+ Neues Quiz</button>
      <button class="btn btn-secondary" onclick="showCreateForm('arbeitsblatt')">+ Neues Arbeitsblatt</button>
    </div>
  </div>

  <div id="msg"></div>
  <div id="quizList"><div class="loading">Wird geladen</div></div>

  <!-- Erstell-Formular (wird per JS eingefügt) -->
  <div id="createForm" class="hidden">
    <div class="card">
      <div class="flex-between mb-2">
        <h2 id="createFormTitle" style="font-size:1.3rem">Neues Quiz erstellen</h2>
        <button class="btn btn-ghost btn-sm" onclick="hideCreateForm()">Abbrechen</button>
      </div>
      <div id="createMsg"></div>
      <input type="hidden" id="createType" value="quiz">

      <div class="form-group">
        <label>Titel *</label>
        <input type="text" id="quizTitle" placeholder="z.B. Mathematik: Gleichungen">
      </div>
      <div class="form-group">
        <label>Fach</label>
        <input type="text" id="quizSubject" placeholder="z.B. Mathematik">
      </div>
      <div class="form-group">
        <label>Beschreibung (optional)</label>
        <textarea id="quizDesc" placeholder="Kurze Beschreibung für die Schüler…" rows="2" style="resize:vertical"></textarea>
      </div>

      <div id="questionsContainer"></div>
      <button class="btn btn-ghost" style="width:100%;border-style:dashed;margin-bottom:1rem" onclick="addQuestion()">+ Frage hinzufügen</button>
      <button class="btn btn-primary" style="width:100%" onclick="saveQuiz()">Speichern</button>
    </div>
  </div>
</div>

<script>
let questionCount = 0;

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/auth/admin-logout', { method: 'POST' });
  window.location.href = '/admin';
});

function showCreateForm(type) {
  document.getElementById('createType').value = type;
  document.getElementById('createFormTitle').textContent =
    type === 'arbeitsblatt' ? 'Neues Arbeitsblatt erstellen' : 'Neues Quiz erstellen';
  document.getElementById('createForm').classList.remove('hidden');
  document.getElementById('quizList').classList.add('hidden');
  questionCount = 0;
  document.getElementById('questionsContainer').innerHTML = '';
  ['quizTitle','quizSubject','quizDesc'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('createMsg').innerHTML = '';
  addQuestion();
  document.getElementById('createForm').scrollIntoView({ behavior: 'smooth' });
}

function hideCreateForm() {
  document.getElementById('createForm').classList.add('hidden');
  document.getElementById('quizList').classList.remove('hidden');
}

function addQuestion() {
  questionCount++;
  const n = questionCount;
  const div = document.createElement('div');
  div.className = 'question-builder';
  div.id = `q${n}`;
  div.innerHTML = `
    <div class="question-builder-header">
      <span>Frage / Aufgabe ${n}</span>
      <button type="button" class="btn btn-sm btn-danger" onclick="document.getElementById('q${n}').remove()">✕</button>
    </div>
    <div class="form-group" style="margin-bottom:0.6rem">
      <input type="text" id="q${n}_text" placeholder="Fragetext eingeben…" style="font-weight:700">
    </div>
    <p style="font-size:0.8rem;font-weight:700;margin-bottom:0.4rem;color:#666">Antworten (richtige markieren):</p>
    <div class="options-grid">
      ${[0,1,2,3].map(i => `
        <div class="option-row">
          <input type="radio" name="correct_${n}" value="${i}" id="r${n}_${i}" ${i===0?'checked':''}>
          <input type="text" id="q${n}_opt${i}" placeholder="Antwort ${String.fromCharCode(65+i)}">
        </div>`).join('')}
    </div>
    <div class="form-group mt-1" style="display:flex;align-items:center;gap:0.5rem">
      <label style="margin:0;white-space:nowrap">XP-Wert:</label>
      <input type="number" id="q${n}_xp" value="15" min="5" max="50" style="width:80px">
    </div>
  `;
  document.getElementById('questionsContainer').appendChild(div);
}

async function saveQuiz() {
  const msg = document.getElementById('createMsg');
  const title = document.getElementById('quizTitle').value.trim();
  const subject = document.getElementById('quizSubject').value.trim();
  const description = document.getElementById('quizDesc').value.trim();
  const type = document.getElementById('createType').value;

  if (!title) { msg.innerHTML = '<div class="alert alert-error">Bitte einen Titel eingeben.</div>'; return; }

  const questions = [];
  for (let n = 1; n <= questionCount; n++) {
    const qEl = document.getElementById(`q${n}`);
    if (!qEl) continue;
    const text = document.getElementById(`q${n}_text`)?.value.trim();
    if (!text) continue;
    const options = [0,1,2,3].map(i => document.getElementById(`q${n}_opt${i}`)?.value.trim() || '');
    if (options.some(o => !o)) {
      msg.innerHTML = `<div class="alert alert-error">Bitte alle Antwortoptionen bei Frage ${n} ausfüllen.</div>`;
      return;
    }
    const correct_index = parseInt(document.querySelector(`input[name="correct_${n}"]:checked`)?.value ?? 0);
    const xp_value = parseInt(document.getElementById(`q${n}_xp`)?.value ?? 15);
    questions.push({ text, options, correct_index, xp_value });
  }

  if (!questions.length) {
    msg.innerHTML = '<div class="alert alert-error">Mindestens eine vollständige Frage erforderlich.</div>';
    return;
  }

  try {
    const res = await fetch('/api/admin/quiz', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, subject, description, type, questions }),
    });
    const data = await res.json();
    if (!res.ok) { msg.innerHTML = `<div class="alert alert-error">${data.error}</div>`; return; }
    const label = type === 'arbeitsblatt' ? 'Arbeitsblatt' : 'Quiz';
    msg.innerHTML = `<div class="alert alert-success">✓ ${label} "${title}" mit ${questions.length} Fragen gespeichert!</div>`;
    setTimeout(() => { hideCreateForm(); loadAll(); }, 1500);
  } catch {
    msg.innerHTML = '<div class="alert alert-error">Serverfehler.</div>';
  }
}

async function deleteItem(id, title) {
  if (!confirm(`"${title}" wirklich löschen?`)) return;
  const res = await fetch(`/api/admin/quiz/${id}`, { method: 'DELETE' });
  if (!res.ok) { alert('Fehler beim Löschen.'); return; }
  loadAll();
}

function renderTable(items, emptyText) {
  if (!items.length) return `<p class="text-muted" style="padding:1rem">${emptyText}</p>`;
  return `
    <div style="overflow-x:auto">
      <table class="admin-table">
        <thead><tr><th>Titel</th><th>Fach</th><th>Fragen</th><th>Erstellt</th><th>Aktionen</th></tr></thead>
        <tbody>
          ${items.map(q => `
            <tr>
              <td><strong>${q.title}</strong>${q.description ? `<br><span class="text-muted" style="font-size:0.78rem">${q.description.substring(0,80)}…</span>` : ''}</td>
              <td>${q.subject || '–'}</td>
              <td>${q.question_count}</td>
              <td>${new Date(q.created_at).toLocaleDateString('de-DE')}</td>
              <td>
                <button class="btn btn-sm btn-danger" onclick="deleteItem(${q.id},'${q.title.replace(/'/g,"\\'")}')">Löschen</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

async function loadAll() {
  const list = document.getElementById('quizList');
  try {
    const [itemsRes, resultsRes] = await Promise.all([
      fetch('/api/admin/quiz'),
      fetch('/api/admin/results'),
    ]);
    if (itemsRes.status === 401) { window.location.href = '/admin'; return; }

    const items = await itemsRes.json();
    const results = await resultsRes.json();

    const quizzes = items.filter(i => i.type === 'quiz');
    const sheets = items.filter(i => i.type === 'arbeitsblatt');

    list.innerHTML = `
      <div class="card mb-2">
        <div class="flex-between mb-1">
          <h2 style="font-size:1.2rem">⚡ Quizzes (${quizzes.length})</h2>
          <button class="btn btn-primary btn-sm" onclick="showCreateForm('quiz')">+ Neu</button>
        </div>
        ${renderTable(quizzes, 'Noch keine Quizzes. Erstelle dein erstes!')}
      </div>

      <div class="card mb-2">
        <div class="flex-between mb-1">
          <h2 style="font-size:1.2rem">📋 Digitale Arbeitsblätter (${sheets.length})</h2>
          <button class="btn btn-secondary btn-sm" onclick="showCreateForm('arbeitsblatt')">+ Neu</button>
        </div>
        ${renderTable(sheets, 'Noch keine Arbeitsblätter.')}
      </div>

      <div class="card">
        <h2 style="font-size:1.1rem;margin-bottom:0.8rem">Letzte Ergebnisse (${results.length})</h2>
        ${results.length ? `
          <div style="overflow-x:auto">
            <table class="admin-table">
              <thead><tr><th>Schüler</th><th>Titel</th><th>Score</th><th>XP</th><th>Versuch</th><th>Datum</th></tr></thead>
              <tbody>
                ${results.slice(0,50).map(r => `
                  <tr>
                    <td><strong>${r.nick}</strong></td>
                    <td>${r.quiz_title}</td>
                    <td>${r.score}/${r.total} (${Math.round(r.score/r.total*100)}%)</td>
                    <td style="color:var(--c3);font-weight:800">+${r.xp_earned}</td>
                    <td>${r.attempt_number}.</td>
                    <td>${new Date(r.completed_at).toLocaleDateString('de-DE')}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>` : '<p class="text-muted">Noch keine Ergebnisse.</p>'}
      </div>
    `;
  } catch (err) {
    list.innerHTML = '<div class="alert alert-error">Fehler beim Laden.</div>';
  }
}

loadAll();
</script>
</body>
</html>
