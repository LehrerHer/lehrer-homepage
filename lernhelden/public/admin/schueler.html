<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lerngladiatoren Admin – Schüler</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="admin-nav">
  <span class="admin-logo">🛡️ Lerngladiatoren Admin</span>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/schueler" class="active">Schüler</a>
  <a href="/admin/quiz">Quizzes</a>
  <a href="/admin/export">Export</a>
  <a href="#" id="logoutBtn" style="color:#ef4444!important">Abmelden</a>
</nav>

<div class="container-wide">
  <div class="flex-between mb-2" style="flex-wrap:wrap;gap:0.8rem">
    <h1 style="font-family:'Fredoka One',cursive;font-size:1.8rem">Schüler verwalten</h1>
    <button class="btn btn-primary" onclick="openAddModal()">+ Schüler anlegen</button>
  </div>

  <div class="mb-2">
    <input type="text" id="searchInput" placeholder="Nach Spitzname oder Klarname suchen…"
      style="padding:0.6rem 1rem;border:2px solid #e2e8f0;border-radius:10px;font-family:inherit;width:280px;font-size:0.9rem">
  </div>

  <div id="msg"></div>

  <div class="admin-table-wrap">
    <table class="admin-table" id="studentTable">
      <thead>
        <tr>
          <th>Spitzname</th>
          <th>Klarname</th>
          <th>Klasse</th>
          <th>XP</th>
          <th>Level</th>
          <th>Badges</th>
          <th>Letzter Login</th>
          <th>Aktionen</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="8" class="loading">Schüler werden geladen</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Add Student Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Schüler anlegen</h2>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div id="addMsg"></div>
    <form id="addForm">
      <div class="form-group">
        <label>Spitzname *</label>
        <input type="text" id="addNick" placeholder="z.B. SuperHeld42" required>
      </div>
      <div class="form-group">
        <label>PIN (4 Ziffern) *</label>
        <input type="text" id="addPin" class="pin-input" placeholder="1234" maxlength="4" pattern="\d{4}" inputmode="numeric" required>
      </div>
      <div class="form-group">
        <label>Klarname (intern)</label>
        <input type="text" id="addRealName" placeholder="Max Mustermann">
      </div>
      <div class="form-group">
        <label>Klasse</label>
        <input type="text" id="addClass" placeholder="z.B. 8a">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Schüler anlegen</button>
    </form>
  </div>
</div>

<!-- XP Edit Modal -->
<div class="modal-overlay" id="xpModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="xpModalTitle">XP anpassen</h2>
      <button class="modal-close" onclick="closeModal('xpModal')">✕</button>
    </div>
    <div id="xpMsg"></div>
    <form id="xpForm">
      <input type="hidden" id="xpStudentId">
      <div class="form-group">
        <label>XP-Änderung (positiv = hinzufügen, negativ = abziehen)</label>
        <input type="number" id="xpAmount" placeholder="z.B. 50 oder -10" required>
      </div>
      <div class="form-group">
        <label>Grund</label>
        <input type="text" id="xpReason" placeholder="z.B. Arbeitsblatt eingereicht">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">XP speichern</button>
    </form>
  </div>
</div>

<!-- Badge Modal -->
<div class="modal-overlay" id="badgeModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Badge vergeben</h2>
      <button class="modal-close" onclick="closeModal('badgeModal')">✕</button>
    </div>
    <div id="badgeMsg"></div>
    <form id="badgeForm">
      <input type="hidden" id="badgeStudentId">
      <div class="form-group">
        <label>Badge auswählen</label>
        <select id="badgeSelect" required></select>
      </div>
      <button type="submit" class="btn btn-accent" style="width:100%">Badge vergeben</button>
    </form>
  </div>
</div>

<!-- XP Log Modal -->
<div class="modal-overlay" id="logModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="logModalTitle">XP-Verlauf</h2>
      <button class="modal-close" onclick="closeModal('logModal')">✕</button>
    </div>
    <div id="logContent"></div>
  </div>
</div>

<script>
let allStudents = [];
let allBadges = [];

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/auth/admin-logout', { method: 'POST' });
  window.location.href = '/admin';
});

function formatDate(dt) {
  if (!dt) return '–';
  return new Date(dt).toLocaleDateString('de-DE');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('open'); });
});

function openAddModal() { document.getElementById('addForm').reset(); document.getElementById('addMsg').innerHTML = ''; openModal('addModal'); }

function openXpModal(id, nick) {
  document.getElementById('xpStudentId').value = id;
  document.getElementById('xpModalTitle').textContent = `XP anpassen – ${nick}`;
  document.getElementById('xpForm').reset();
  document.getElementById('xpStudentId').value = id;
  document.getElementById('xpMsg').innerHTML = '';
  openModal('xpModal');
}

function openBadgeModal(id, nick) {
  document.getElementById('badgeStudentId').value = id;
  document.getElementById('badgeMsg').innerHTML = '';
  document.getElementById('badgeSelect').innerHTML = allBadges.map(b => `<option value="${b.id}">${b.icon} ${b.name}</option>`).join('');
  openModal('badgeModal');
}

async function openLogModal(id, nick) {
  document.getElementById('logModalTitle').textContent = `XP-Verlauf – ${nick}`;
  document.getElementById('logContent').innerHTML = '<div class="loading">Wird geladen</div>';
  openModal('logModal');
  const res = await fetch(`/api/admin/xp-log/${id}`);
  const log = await res.json();
  document.getElementById('logContent').innerHTML = log.length
    ? `<ul class="xp-log-list">${log.map(e => `
        <li class="xp-log-item">
          <span>${e.reason || 'XP'}</span>
          <span><span class="xp-amount ${e.amount >= 0 ? 'pos' : 'neg'}">${e.amount >= 0 ? '+' : ''}${e.amount} XP</span> <span class="text-muted">${new Date(e.created_at).toLocaleDateString('de-DE')}</span></span>
        </li>`).join('')}</ul>`
    : '<p class="text-muted">Keine Einträge.</p>';
}

function renderTable(students) {
  const tbody = document.getElementById('tbody');
  if (!students.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-muted text-center" style="padding:1.5rem">Keine Schüler gefunden.</td></tr>';
    return;
  }
  tbody.innerHTML = students.map(s => `
    <tr>
      <td><strong>${s.nick}</strong></td>
      <td>${s.real_name || '<span class="text-muted">–</span>'}</td>
      <td>${s.class || '–'}</td>
      <td style="font-family:'Fredoka One',cursive;color:var(--c3)">${s.xp}</td>
      <td>${s.levelName}</td>
      <td>${s.badge_count}</td>
      <td>${formatDate(s.last_active)}</td>
      <td>
        <div style="display:flex;gap:0.3rem;flex-wrap:wrap">
          <button class="btn btn-sm btn-secondary" onclick="openXpModal(${s.id},'${s.nick.replace(/'/g, "\\'")}')">XP</button>
          <button class="btn btn-sm btn-accent" onclick="openBadgeModal(${s.id},'${s.nick.replace(/'/g, "\\'")}')">Badge</button>
          <button class="btn btn-sm btn-ghost" onclick="openLogModal(${s.id},'${s.nick.replace(/'/g, "\\'")}')">Log</button>
          <button class="btn btn-sm btn-danger" onclick="deleteStudent(${s.id},'${s.nick.replace(/'/g, "\\'")}')">✕</button>
        </div>
      </td>
    </tr>`).join('');
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  const filtered = allStudents.filter(s =>
    s.nick.toLowerCase().includes(q) || (s.real_name && s.real_name.toLowerCase().includes(q))
  );
  renderTable(filtered);
});

document.getElementById('addForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('addMsg');
  const body = {
    nick: document.getElementById('addNick').value.trim(),
    pin: document.getElementById('addPin').value,
    real_name: document.getElementById('addRealName').value.trim() || undefined,
    class: document.getElementById('addClass').value.trim() || undefined,
  };
  try {
    const res = await fetch('/api/admin/students', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) { msg.innerHTML = `<div class="alert alert-error">${data.error}</div>`; return; }
    msg.innerHTML = `<div class="alert alert-success">✓ Schüler "${body.nick}" angelegt! PIN: ${body.pin}</div>`;
    document.getElementById('addForm').reset();
    loadStudents();
  } catch { msg.innerHTML = '<div class="alert alert-error">Serverfehler.</div>'; }
});

document.getElementById('xpForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('xpMsg');
  const id = document.getElementById('xpStudentId').value;
  const amount = parseInt(document.getElementById('xpAmount').value);
  const reason = document.getElementById('xpReason').value.trim();
  try {
    const res = await fetch(`/api/admin/students/${id}/xp`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ amount, reason }),
    });
    const data = await res.json();
    if (!res.ok) { msg.innerHTML = `<div class="alert alert-error">${data.error}</div>`; return; }
    msg.innerHTML = `<div class="alert alert-success">✓ Neue XP: ${data.new_xp}</div>`;
    loadStudents();
  } catch { msg.innerHTML = '<div class="alert alert-error">Serverfehler.</div>'; }
});

document.getElementById('badgeForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('badgeMsg');
  const id = document.getElementById('badgeStudentId').value;
  const badge_id = document.getElementById('badgeSelect').value;
  try {
    const res = await fetch(`/api/admin/students/${id}/badges`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ badge_id }),
    });
    const data = await res.json();
    if (!res.ok) { msg.innerHTML = `<div class="alert alert-error">${data.error}</div>`; return; }
    msg.innerHTML = `<div class="alert alert-success">✓ Badge vergeben!</div>`;
    loadStudents();
  } catch { msg.innerHTML = '<div class="alert alert-error">Serverfehler.</div>'; }
});

async function deleteStudent(id, nick) {
  if (!confirm(`Schüler "${nick}" wirklich löschen? Alle Daten gehen verloren!`)) return;
  try {
    const res = await fetch(`/api/admin/students/${id}`, { method: 'DELETE' });
    if (!res.ok) { alert('Fehler beim Löschen.'); return; }
    loadStudents();
  } catch { alert('Serverfehler.'); }
}

async function loadStudents() {
  try {
    const [studRes, badgeRes] = await Promise.all([
      fetch('/api/admin/students'),
      fetch('/api/admin/badges'),
    ]);
    if (studRes.status === 401) { window.location.href = '/admin'; return; }
    allStudents = await studRes.json();
    allBadges = await badgeRes.json();
    renderTable(allStudents);
  } catch {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="8"><div class="alert alert-error">Fehler beim Laden.</div></td></tr>';
  }
}

loadStudents();
</script>
</body>
</html>
