<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lerngladiatoren Admin – Materialien</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .mat-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem 1.2rem;
    }
    @media (max-width: 600px) { .mat-form-grid { grid-template-columns: 1fr; } }
    .mat-form-grid .form-group.full { grid-column: 1 / -1; }
    .mat-list { display: flex; flex-direction: column; gap: 0.7rem; margin-top: 1rem; }
    .mat-item {
      display: flex; align-items: flex-start; gap: 1rem;
      background: var(--bg);
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
    }
    .mat-item-icon { font-size: 1.6rem; flex-shrink: 0; }
    .mat-item-body { flex: 1; }
    .mat-item-titel { font-weight: 800; font-size: 1rem; }
    .mat-item-desc { font-size: 0.85rem; color: #666; margin: 0.1rem 0; }
    .mat-item-meta { font-size: 0.78rem; color: #999; display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 0.3rem; }
    .mat-item-url { font-size: 0.82rem; color: var(--c4); word-break: break-all; }
    .mat-fach-tag {
      background: #f0f4ff; color: var(--c4);
      font-size: 0.72rem; font-weight: 800; text-transform: uppercase;
      padding: 0.15rem 0.5rem; border-radius: 6px; letter-spacing: 0.04em;
    }
    .icon-picker { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.3rem; }
    .icon-btn {
      font-size: 1.3rem; padding: 0.3rem 0.5rem; border: 2px solid #e2e8f0;
      border-radius: 8px; background: #f8faff; cursor: pointer; transition: border-color 0.15s;
    }
    .icon-btn.selected { border-color: var(--c4); background: #f0ebff; }
  </style>
</head>
<body>

<nav class="admin-nav">
  <span class="admin-logo">🛡️ Lerngladiatoren Admin</span>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/schueler">Gladiatoren</a>
  <a href="/admin/materialien" class="active">Materialien</a>
  <a href="/admin/quiz">Quizzes</a>
  <a href="/admin/export">Export</a>
  <a href="#" id="logoutBtn" style="color:#ef4444!important">Abmelden</a>
</nav>

<div class="container-wide">
  <div class="flex-between mb-2" style="flex-wrap:wrap;gap:0.8rem">
    <div>
      <h1 style="font-family:'Fredoka One',cursive;font-size:1.8rem">📚 Materialien</h1>
      <p class="text-muted" style="font-size:0.9rem">Materialien erscheinen automatisch im Materialien-Bereich der Homepage.</p>
    </div>
  </div>

  <div id="msg"></div>

  <!-- Add form -->
  <div class="card mb-2">
    <h2 style="font-size:1.15rem;margin-bottom:1rem">+ Neues Material hinzufügen</h2>
    <form id="addForm">
      <div class="mat-form-grid">
        <div class="form-group full">
          <label>Titel *</label>
          <input type="text" id="mTitel" placeholder="z.B. Aufbau Interpretationsaufsatz" required>
        </div>
        <div class="form-group full">
          <label>Beschreibung</label>
          <input type="text" id="mDesc" placeholder="Kurze Erklärung (optional)">
        </div>
        <div class="form-group full">
          <label>Link / URL *</label>
          <input type="url" id="mUrl" placeholder="https://… oder relativer Pfad wie pdfs/datei.pdf" required>
        </div>
        <div class="form-group">
          <label>Fach / Bereich</label>
          <select id="mSeite">
            <option value="allgemein">Allgemein</option>
            <option value="deutsch">Deutsch</option>
            <option value="geschichte">Geschichte</option>
            <option value="wipo">Wirtschaft/Politik</option>
            <option value="informatik">Informatik</option>
            <option value="werte-normen">Werte & Normen</option>
          </select>
        </div>
        <div class="form-group">
          <label>Datum</label>
          <input type="date" id="mDatum">
        </div>
        <div class="form-group full">
          <label>Symbol</label>
          <div class="icon-picker" id="iconPicker">
            <button type="button" class="icon-btn selected" data-icon="📄">📄</button>
            <button type="button" class="icon-btn" data-icon="📝">📝</button>
            <button type="button" class="icon-btn" data-icon="📊">📊</button>
            <button type="button" class="icon-btn" data-icon="📋">📋</button>
            <button type="button" class="icon-btn" data-icon="📖">📖</button>
            <button type="button" class="icon-btn" data-icon="🔗">🔗</button>
            <button type="button" class="icon-btn" data-icon="📰">📰</button>
            <button type="button" class="icon-btn" data-icon="🎥">🎥</button>
            <button type="button" class="icon-btn" data-icon="🖼️">🖼️</button>
            <button type="button" class="icon-btn" data-icon="📎">📎</button>
          </div>
          <input type="hidden" id="mIcon" value="📄">
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:0.8rem">Material hinzufügen</button>
    </form>
  </div>

  <!-- Materials list -->
  <div class="card">
    <div class="flex-between mb-1">
      <h2 style="font-size:1.15rem">Vorhandene Materialien</h2>
      <span class="text-muted" id="matCount"></span>
    </div>
    <div id="matList"><div class="loading">Wird geladen</div></div>
  </div>
</div>

<script>
let selectedIcon = '📄';

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/auth/admin-logout', { method: 'POST' });
  window.location.href = '/admin';
});

// Icon picker
document.getElementById('iconPicker').addEventListener('click', (e) => {
  const btn = e.target.closest('.icon-btn');
  if (!btn) return;
  document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedIcon = btn.dataset.icon;
  document.getElementById('mIcon').value = selectedIcon;
});

// Set today as default date
document.getElementById('mDatum').value = new Date().toISOString().split('T')[0];

function fachLabel(seite) {
  const map = { allgemein:'Allgemein', deutsch:'Deutsch', geschichte:'Geschichte',
    wipo:'Wi/Po', informatik:'Informatik', 'werte-normen':'Werte & Normen' };
  return map[seite] || seite;
}

function renderList(items) {
  const el = document.getElementById('matList');
  document.getElementById('matCount').textContent = `${items.length} Einträge`;
  if (!items.length) {
    el.innerHTML = '<p class="text-muted">Noch keine Materialien vorhanden. Füge das erste hinzu!</p>';
    return;
  }
  el.innerHTML = `<div class="mat-list">${items.map(m => `
    <div class="mat-item" id="mat-${m.id}">
      <div class="mat-item-icon">${m.icon || '📄'}</div>
      <div class="mat-item-body">
        <div class="mat-item-titel">${m.titel}</div>
        ${m.beschreibung ? `<div class="mat-item-desc">${m.beschreibung}</div>` : ''}
        ${m.url ? `<div class="mat-item-url"><a href="${m.url}" target="_blank" rel="noopener">${m.url}</a></div>` : ''}
        <div class="mat-item-meta">
          <span class="mat-fach-tag">${fachLabel(m.seite)}</span>
          ${m.datum ? `<span>📅 ${new Date(m.datum).toLocaleDateString('de-DE')}</span>` : ''}
        </div>
      </div>
      <button class="btn btn-sm btn-danger" onclick="deleteMat(${m.id},'${m.titel.replace(/'/g,"\\'")}')">✕</button>
    </div>`).join('')}</div>`;
}

async function loadMats() {
  try {
    const res = await fetch('/api/admin/materialien');
    if (res.status === 401) { window.location.href = '/admin'; return; }
    const items = await res.json();
    renderList(items);
  } catch {
    document.getElementById('matList').innerHTML = '<div class="alert alert-error">Fehler beim Laden.</div>';
  }
}

async function deleteMat(id, titel) {
  if (!confirm(`Material "${titel}" wirklich löschen?`)) return;
  try {
    const res = await fetch(`/api/admin/materialien/${id}`, { method: 'DELETE' });
    if (!res.ok) { alert('Fehler beim Löschen.'); return; }
    document.getElementById(`mat-${id}`)?.remove();
    loadMats();
  } catch { alert('Serverfehler.'); }
}

document.getElementById('addForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  msg.innerHTML = '';
  const body = {
    titel: document.getElementById('mTitel').value.trim(),
    beschreibung: document.getElementById('mDesc').value.trim(),
    icon: document.getElementById('mIcon').value,
    url: document.getElementById('mUrl').value.trim(),
    seite: document.getElementById('mSeite').value,
    datum: document.getElementById('mDatum').value,
  };
  try {
    const res = await fetch('/api/admin/materialien', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) { msg.innerHTML = `<div class="alert alert-error">${data.error}</div>`; return; }
    msg.innerHTML = `<div class="alert alert-success">✓ Material "${body.titel}" hinzugefügt!</div>`;
    document.getElementById('addForm').reset();
    document.getElementById('mDatum').value = new Date().toISOString().split('T')[0];
    document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector('.icon-btn[data-icon="📄"]').classList.add('selected');
    document.getElementById('mIcon').value = '📄';
    selectedIcon = '📄';
    loadMats();
    setTimeout(() => { msg.innerHTML = ''; }, 4000);
  } catch { msg.innerHTML = '<div class="alert alert-error">Serverfehler.</div>'; }
});

loadMats();
</script>
</body>
</html>
