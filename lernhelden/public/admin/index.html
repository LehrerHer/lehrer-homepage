<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lerngladiatoren – Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)">
  <div class="login-card">
    <div class="login-logo" style="color:var(--c2)">🛡️ Admin</div>
    <p class="login-subtitle">Lerngladiatoren Verwaltung</p>

    <div id="msg"></div>

    <form id="adminLoginForm" method="POST" action="/api/auth/admin-login">
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" placeholder="Admin-Passwort" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">Anmelden</button>
    </form>

    <p class="text-muted mt-2">
      <a href="/" style="color:var(--c4)">← Zurück zur Startseite</a>
    </p>
  </div>
</div>

<script>
(function () {
  // Show error from query param (server-side redirect sets ?error=...)
  const params = new URLSearchParams(window.location.search);
  const err = params.get('error');
  if (err) {
    const msgs = {
      wrong:   'Falsches Passwort.',
      missing: 'Bitte Passwort eingeben.',
      server:  'Serverfehler – bitte erneut versuchen.',
    };
    document.getElementById('msg').innerHTML =
      `<div class="alert alert-error">❌ ${msgs[err] || 'Fehler beim Anmelden.'}</div>`;
    // Clean up URL so reload doesn't re-show the error
    history.replaceState({}, '', '/admin');
  }

  // Redirect if already logged in
  fetch('/api/auth/admin-me')
    .then(r => r.json())
    .then(d => { if (d.loggedIn) window.location.href = '/admin/dashboard'; })
    .catch(() => {});

  // Progressive enhancement: AJAX submit so the button shows feedback
  document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');
    msg.innerHTML = '';
    btn.disabled = true;
    btn.textContent = 'Bitte warten…';

    const password = document.getElementById('password').value;
    try {
      const res = await fetch('/api/auth/admin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      const data = await res.json();
      if (!res.ok) {
        msg.innerHTML = `<div class="alert alert-error">❌ ${data.error}</div>`;
        btn.disabled = false;
        btn.textContent = 'Anmelden';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        return;
      }
      btn.textContent = '✓ Weiterleitung…';
      window.location.href = '/admin/dashboard';
    } catch {
      // JS fetch failed — fall back to native form submit
      document.getElementById('adminLoginForm').removeEventListener('submit', arguments.callee);
      document.getElementById('adminLoginForm').submit();
    }
  });
})();
</script>
</body>
</html>
