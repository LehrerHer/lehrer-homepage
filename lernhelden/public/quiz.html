<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lernhelden – Quizzes</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="nav">
  <span class="nav-logo">Lern<span>helden</span></span>
  <a href="/profil">Profil</a>
  <a href="/quiz" class="active">Quizzes</a>
  <a href="/arbeitsblatt">Arbeitsblätter</a>
  <a href="/rangliste">Rangliste</a>
  <a href="#" class="btn-logout" id="logoutBtn">Abmelden</a>
</nav>

<div class="container">
  <div class="page-header">
    <h1>📚 Quizzes</h1>
    <p>Beantworte Fragen und sammle XP!</p>
  </div>
  <div id="app"><div class="loading">Quizzes werden geladen</div></div>
</div>

<script>
async function load() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('/api/quiz');
    if (res.status === 401) { window.location.href = '/login'; return; }
    const quizzes = await res.json();

    if (!quizzes.length) {
      app.innerHTML = '<p class="text-muted text-center">Noch keine Quizzes vorhanden.</p>';
      return;
    }

    app.innerHTML = `<div class="quiz-grid">${quizzes.map(q => {
      const done = q.attempt_count > 0;
      return `
        <a href="/quiz/${q.id}" class="quiz-card ${done ? 'completed' : ''}">
          <div class="quiz-subject">${q.subject || 'Allgemein'}</div>
          <div class="quiz-title">${q.title}</div>
          <div class="quiz-meta">
            <span>📝 ${q.question_count} Fragen</span>
            ${done ? `<span class="quiz-done-tag">✓ Abgeschlossen (${q.attempt_count}×)</span>` : ''}
          </div>
          ${done && q.first_xp ? `<div class="text-muted mt-1" style="font-size:0.8rem">Erstes Mal: +${q.first_xp} XP</div>` : ''}
        </a>`;
    }).join('')}</div>`;
  } catch {
    app.innerHTML = '<div class="alert alert-error">Fehler beim Laden der Quizzes.</div>';
  }
}

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
});

load();
</script>
</body>
</html>
