<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lerngladiatoren – Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">Lern<span>gladiatoren</span></div>
    <p style="font-size:0.82rem;color:#888;font-style:italic;margin:0.3rem 0 0.8rem;line-height:1.4">Im Kolosseum des Wissens kämpft ihr euch frei durch eure eigene Kompetenz.</p>
    <p class="login-subtitle">Melde dich mit deinem Spitznamen und PIN an</p>

    <div id="msg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="nick">Spitzname</label>
        <input type="text" id="nick" name="nick" placeholder="Dein Spitzname" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="pin">PIN (4 Ziffern)</label>
        <input type="password" id="pin" name="pin" class="pin-input" placeholder="····" maxlength="4" pattern="\d{4}" inputmode="numeric" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">Anmelden</button>
    </form>

    <p class="text-muted mt-2">
      Rangliste ohne Login: <a href="/rangliste" style="color:var(--c4);font-weight:700;">Rangliste ansehen</a>
    </p>
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const msg = document.getElementById('msg');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.innerHTML = '';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Bitte warten…';

  const nick = document.getElementById('nick').value.trim();
  const pin = document.getElementById('pin').value;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nick, pin }),
    });
    const data = await res.json();

    if (!res.ok) {
      msg.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Anmelden';
      return;
    }

    window.location.href = '/profil';
  } catch {
    msg.innerHTML = '<div class="alert alert-error">Verbindungsfehler. Bitte versuche es erneut.</div>';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Anmelden';
  }
});
</script>
</body>
</html>
