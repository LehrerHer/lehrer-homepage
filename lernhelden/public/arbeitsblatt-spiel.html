<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lerngladiatoren – Arbeitsblatt</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .ab-container { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    .ab-header { background: var(--card); border-radius: var(--radius); padding: 1.5rem 2rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); border-top: 4px solid var(--c3); }
    .ab-header-fach { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--c3); margin-bottom: 0.3rem; }
    .ab-header-titel { font-family: 'Fredoka One', cursive; font-size: 1.8rem; margin-bottom: 0.4rem; }
    .ab-header-desc { color: #666; font-size: 0.93rem; line-height: 1.5; }

    .ab-question-block {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.5rem 1.8rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      border-left: 4px solid #e2e8f0;
      transition: border-color 0.3s;
    }
    .ab-question-block.answered-correct { border-left-color: var(--c3); }
    .ab-question-block.answered-wrong { border-left-color: var(--c1); }

    .ab-q-num { font-size: 0.78rem; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 0.5rem; }
    .ab-q-xp { float: right; background: #f0f4ff; color: var(--c4); font-weight: 800; font-size: 0.78rem; padding: 0.15rem 0.5rem; border-radius: 10px; }
    .ab-q-text { font-weight: 700; font-size: 1.05rem; margin-bottom: 1rem; line-height: 1.4; clear: both; }

    .ab-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    @media (max-width: 500px) { .ab-options { grid-template-columns: 1fr; } }

    .ab-option-btn {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 2px solid #e2e8f0;
      background: #f8faff;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 0.93rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      color: var(--ink);
    }
    .ab-option-btn:hover:not(:disabled) { border-color: var(--c4); background: #f0ebff; }
    .ab-option-btn.selected { border-color: var(--c4); background: #f0ebff; }
    .ab-option-btn.correct { border-color: var(--c3); background: #e6fff8; color: #1a6b5e; }
    .ab-option-btn.wrong { border-color: var(--c1); background: #fff0f0; color: #9b2c2c; }
    .ab-option-btn:disabled { cursor: default; }

    .ab-option-letter {
      display: inline-block;
      width: 1.4em;
      height: 1.4em;
      background: #e2e8f0;
      border-radius: 50%;
      text-align: center;
      line-height: 1.4em;
      font-size: 0.8em;
      font-weight: 800;
      margin-right: 0.4rem;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .ab-option-btn.selected .ab-option-letter { background: var(--c4); color: white; }
    .ab-option-btn.correct .ab-option-letter { background: var(--c3); color: white; }
    .ab-option-btn.wrong .ab-option-letter { background: var(--c1); color: white; }

    .ab-submit-bar {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.5rem 2rem;
      box-shadow: var(--shadow);
      text-align: center;
      margin-top: 1.5rem;
    }
    .ab-counter {
      font-size: 0.9rem;
      color: #888;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .ab-counter strong { color: var(--c4); font-family: 'Fredoka One', cursive; font-size: 1.1rem; }

    .ab-result { text-align: center; padding: 2.5rem 2rem; }
    .ab-result-score { font-family: 'Fredoka One', cursive; font-size: 4rem; color: var(--c3); }
    .ab-result-xp { font-family: 'Fredoka One', cursive; font-size: 2.2rem; color: var(--c4); margin: 0.4rem 0 1rem; }
  </style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">Lern<span>gladiatoren</span></span>
  <a href="/profil">Profil</a>
  <a href="/quiz">Quizzes</a>
  <a href="/arbeitsblatt" class="active">Arbeitsblätter</a>
  <a href="/rangliste">Rangliste</a>
  <a href="#" class="btn-logout" id="logoutBtn">Abmelden</a>
</nav>

<div class="ab-container" id="app">
  <div class="loading">Arbeitsblatt wird geladen</div>
</div>

<div class="popup-overlay" id="popupOverlay"></div>

<script src="/js/avatar.js"></script>
<script>
const CONFETTI_COLORS = ['#FF6B6B','#FFE66D','#4ECDC4','#A78BFA','#68d391'];
const sheetId = window.location.pathname.split('/').pop();

let sheet = null;
let selections = {};
let submitted = false;

function showPopup(html, duration = 2200) {
  const overlay = document.getElementById('popupOverlay');
  const el = document.createElement('div');
  el.innerHTML = html;
  overlay.appendChild(el.firstChild);
  setTimeout(() => overlay.firstChild && overlay.removeChild(overlay.firstChild), duration);
}

function showConfetti() {
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    el.style.width = (Math.random() * 9 + 6) + 'px';
    el.style.height = (Math.random() * 9 + 6) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    el.style.animationDuration = (Math.random() * 1.3 + 1.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
}

function updateCounter() {
  const answered = Object.keys(selections).length;
  const total = sheet.questions.length;
  const el = document.getElementById('abCounter');
  if (el) {
    el.innerHTML = `Beantwortet: <strong>${answered}</strong> von <strong>${total}</strong>`;
  }
  const btn = document.getElementById('abSubmitBtn');
  if (btn) {
    btn.disabled = answered < total;
    btn.textContent = answered < total
      ? `Noch ${total - answered} Frage(n) offen`
      : '📤 Abgeben & auswerten';
  }
}

function renderSheet() {
  const app = document.getElementById('app');
  const maxXP = sheet.questions.reduce((s, q) => s + q.xp_value, 0) + 25;

  app.innerHTML = `
    <div class="ab-header">
      <div class="ab-header-fach">${sheet.subject || 'Allgemein'}</div>
      <div class="ab-header-titel">📋 ${sheet.title}</div>
      ${sheet.description ? `<div class="ab-header-desc">${sheet.description}</div>` : ''}
      <div style="margin-top:0.8rem;display:flex;gap:0.8rem;font-size:0.85rem;color:#888;font-weight:700">
        <span>📝 ${sheet.questions.length} Aufgaben</span>
        <span>⚡ bis zu ${maxXP} XP</span>
      </div>
    </div>

    <div id="questionsArea">
      ${sheet.questions.map((q, i) => `
        <div class="ab-question-block" id="qblock${i}">
          <div class="ab-q-num">
            Aufgabe ${i + 1}
            <span class="ab-q-xp">+${q.xp_value} XP</span>
          </div>
          <div class="ab-q-text">${q.text}</div>
          <div class="ab-options">
            ${q.options.map((opt, j) => `
              <button class="ab-option-btn" data-q="${i}" data-opt="${j}" onclick="selectOption(${i},${j})">
                <span class="ab-option-letter">${String.fromCharCode(65 + j)}</span>${opt}
              </button>`).join('')}
          </div>
        </div>`).join('')}
    </div>

    <div class="ab-submit-bar">
      <div class="ab-counter" id="abCounter">Beantwortet: <strong>0</strong> von <strong>${sheet.questions.length}</strong></div>
      <button class="btn btn-primary" id="abSubmitBtn" disabled onclick="submitSheet()" style="font-size:1.05rem;padding:0.8rem 2rem">
        Noch ${sheet.questions.length} Frage(n) offen
      </button>
      <br><a href="/arbeitsblatt" class="text-muted mt-1" style="display:inline-block;font-size:0.85rem">← Zurück zu Arbeitsblättern</a>
    </div>
  `;
}

function selectOption(qIdx, optIdx) {
  if (submitted) return;
  selections[qIdx] = optIdx;

  // Update button styles for this question
  document.querySelectorAll(`[data-q="${qIdx}"]`).forEach(btn => {
    btn.classList.remove('selected');
    if (parseInt(btn.dataset.opt) === optIdx) btn.classList.add('selected');
  });

  updateCounter();
}

async function submitSheet() {
  if (submitted) return;
  submitted = true;

  const answers = sheet.questions.map((_, i) => selections[i] ?? -1);
  const submitBtn = document.getElementById('abSubmitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = '⏳ Wird ausgewertet…';

  try {
    const res = await fetch(`/api/arbeitsblatt/${sheetId}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers }),
    });
    if (res.status === 401) { window.location.href = '/login'; return; }
    const result = await res.json();

    // Show feedback on each question
    sheet.questions.forEach((q, i) => {
      const block = document.getElementById(`qblock${i}`);
      const fb = result.feedback[i];
      if (!block) return;

      document.querySelectorAll(`[data-q="${i}"]`).forEach(btn => {
        const j = parseInt(btn.dataset.opt);
        if (j === fb.correct_index) btn.classList.add('correct');
        else if (j === selections[i] && !fb.correct) btn.classList.add('wrong');
        btn.disabled = true;
        btn.classList.remove('selected');
      });

      block.classList.add(fb.correct ? 'answered-correct' : 'answered-wrong');
    });

    // Update submit bar to result info
    const pct = Math.round((result.score / result.total) * 100);
    const emoji = pct === 100 ? '🏆' : pct >= 60 ? '🎉' : '💪';

    const submitBar = document.querySelector('.ab-submit-bar');
    submitBar.innerHTML = `
      <div style="font-size:2.5rem;margin-bottom:0.3rem">${emoji}</div>
      <div style="font-family:'Fredoka One',cursive;font-size:2.5rem;color:var(--c3)">${result.score} / ${result.total}</div>
      <div style="color:#888;font-weight:700;margin:0.2rem 0 0.5rem">${pct}% richtig</div>
      ${result.xp_earned > 0 ? `<div style="font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--c4)">+${result.xp_earned} XP</div>` : ''}
      ${!result.is_first_attempt ? '<p class="text-muted" style="font-size:0.8rem">Wiederholung: 25% XP</p>' : ''}
      ${result.newBadges && result.newBadges.length ? `
        <div style="margin:0.8rem 0">
          <p style="font-weight:700;margin-bottom:0.4rem">🎖️ Neues Badge!</p>
          <div class="badges-grid" style="justify-content:center">
            ${result.newBadges.map(b => `<div class="badge-chip">${b.icon} ${b.name}</div>`).join('')}
          </div>
        </div>` : ''}
      <div style="display:flex;gap:0.8rem;justify-content:center;margin-top:1.2rem;flex-wrap:wrap">
        <a href="/arbeitsblatt" class="btn btn-ghost">← Weitere Arbeitsblätter</a>
        <a href="/profil" class="btn btn-secondary">Mein Profil</a>
      </div>
    `;

    window.scrollTo({ top: submitBar.offsetTop - 80, behavior: 'smooth' });

    if (result.xp_earned > 0) {
      showPopup(`<div class="xp-popup"><div class="xp-popup-val">+${result.xp_earned}</div><div class="xp-popup-label">XP verdient!</div></div>`);
    }
    if (result.is_perfect) showConfetti();
    if (result.newBadges && result.newBadges.length) {
      result.newBadges.forEach((b, i) => {
        setTimeout(() => {
          showPopup(`<div class="badge-popup"><div class="badge-popup-icon">${b.icon}</div><div class="badge-popup-title">Neues Badge!</div><div class="badge-popup-name">${b.name}</div></div>`, 3100);
        }, i * 900 + 400);
      });
    }
  } catch {
    submitBtn.disabled = false;
    submitBtn.textContent = '📤 Abgeben & auswerten';
    submitted = false;
    document.getElementById('abCounter').insertAdjacentHTML('afterend', '<div class="alert alert-error">Fehler beim Abgeben. Bitte erneut versuchen.</div>');
  }
}

async function loadSheet() {
  const app = document.getElementById('app');
  try {
    const res = await fetch(`/api/arbeitsblatt/${sheetId}`);
    if (res.status === 401) { window.location.href = '/login'; return; }
    if (!res.ok) {
      app.innerHTML = '<div class="alert alert-error">Arbeitsblatt nicht gefunden.</div>';
      return;
    }
    sheet = await res.json();
    renderSheet();
    updateCounter();
  } catch {
    app.innerHTML = '<div class="alert alert-error">Fehler beim Laden des Arbeitsblattes.</div>';
  }
}

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
});

loadSheet();
</script>
</body>
</html>
