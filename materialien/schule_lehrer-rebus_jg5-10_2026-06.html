  // ── HILFSFUNKTIONEN ────────────────────────────────────────────────────────
  function b64toURL(b64) {
    try {
      const bin = atob(b64);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      return URL.createObjectURL(new Blob([arr], {type:'image/jpeg'}));
    } catch(e) {
      return 'data:image/jpeg;base64,' + b64;
    }
  }

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256',
      new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf))
      .map(b => b.toString(16).padStart(2,'0')).join('');
  }

  function normalize(s) {
    return s.toLowerCase()
      .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss');
  }

  function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m+1}, (_,i) => Array.from({length: n+1}, (_,j) => i||j));
    for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] :
        1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
  }

  const QUIZ_SLUG = 'lehrer-rebus';
  let order = [], idx = 0, score = 0, lockedScore = null;

  function initQuiz() {
    // Blob-URLs aufräumen
    blobURLs.forEach(u => URL.revokeObjectURL(u));
    blobURLs = [];

    order = IMAGES.map((_,i) => i);
    for (let i = order.length-1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    idx = 0; score = 0; lockedScore = null;
    answered    = new Array(IMAGES.length).fill(false);
    solutionShown = new Array(IMAGES.length).fill(false);
    regularTotal = IMAGES.length;

    document.getElementById('question-card').style.display = 'block';
    document.getElementById('results').classList.remove('visible');
    showQuestion();
  }

  function showQuestion() {
    const qi = order[idx];
    const isBonus = !!(INFOS[qi] && INFOS[qi].bonus);
    const num = order.slice(0, idx).filter(i => !(INFOS[i]&&INFOS[i].bonus)).length + 1;

    // Fortschrittsbalken
    const pct = (idx / IMAGES.length) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';

    // Frageheader
    document.getElementById('q-num').textContent =
      isBonus ? 'BONUSFRAGE' : `FRAGE ${num} / ${regularTotal}`;
    document.getElementById('bonus-badge').style.display = isBonus ? 'inline' : 'none';

    // Bild laden (Blob für Safari-Fix)
    const url = b64toURL(IMAGES[qi]);
    blobURLs.push(url);
    document.getElementById('q-img').src = url;
    document.getElementById('photo-revealed').style.display = 'none';

    // Input zurücksetzen
    const inp = document.getElementById('answer-input');
    inp.value = '';
    inp.className = 'answer-input';
    inp.disabled = answered[qi];
    inp.placeholder = isBonus ? 'Bonusfrage – Name eingeben …' : 'Name der Lehrkraft …';

    // Feedback
    const fb = document.getElementById('feedback-msg');
    fb.textContent = '';
    fb.className = 'feedback-msg';

    // Info-Karte
    const infoCard = document.getElementById('info-card');
    infoCard.className = 'info-card' + (answered[qi] ? ' visible' : '');
    if (answered[qi]) fillInfoCard(qi);

    // Lösung-Button
    const btnSol = document.getElementById('btn-toggle-sol');
    btnSol.textContent = solutionShown[qi] ? '👤 Meine Antwort' : '💡 Lösung zeigen';
    if (answered[qi]) {
      // zeige Lösung fix
      btnSol.style.display = 'none';
      showSolutionLabel(qi);
    } else {
      btnSol.style.display = '';
    }

    // Weiter-Button
    document.getElementById('btn-next').style.display = answered[qi] ? 'block' : 'none';
    document.getElementById('btn-check').disabled = answered[qi];
  }

  function fillInfoCard(qi) {
    const info = INFOS[qi];
    document.getElementById('info-fach').textContent = info.fach;
    document.getElementById('info-seit').textContent = info.seit;
    const hl = document.getElementById('info-hl');
    hl.innerHTML = '';
    (info.highlights || []).forEach(h => {
      const li = document.createElement('li');
      li.textContent = h;
      hl.appendChild(li);
    });
    if (info.inspiration) {
      const li = document.createElement('li');
      li.textContent = '💬 ' + info.inspiration;
      hl.appendChild(li);
    }
  }

  function showSolutionLabel(qi) {
    const inp = document.getElementById('answer-input');
    inp.value = LABELS[qi];
    inp.className = 'answer-input correct';
    document.getElementById('photo-revealed').style.display = 'flex';
  }

  async function checkAnswer() {
    const qi = order[idx];
    if (answered[qi]) return;
    const raw = document.getElementById('answer-input').value.trim();
    if (!raw) return;

    const norm = normalize(raw);
    const hash = await sha256(norm);
    const accepted = HASHES[qi];

    // Exakter Hash-Treffer
    let correct = accepted.includes(hash);

    // Levenshtein-Toleranz (max 2 Tippfehler, mind. 4 Zeichen)
    if (!correct && norm.length >= 4) {
      correct = accepted.some(h => {
        // Normierter Label-Vergleich
        const label = normalize(LABELS[qi]);
        return levenshtein(norm, label) <= 2;
      });
    }

    const fb = document.getElementById('feedback-msg');
    answered[qi] = true;

    if (correct) {
      if (lockedScore === null) score++;
      fb.textContent = '✅ Richtig!';
      fb.className = 'feedback-msg correct';
      document.getElementById('answer-input').className = 'answer-input correct';
      document.getElementById('photo-revealed').style.display = 'flex';
    } else {
      fb.textContent = '❌ Leider falsch – schau dir die Lösung an!';
      fb.className = 'feedback-msg wrong';
      document.getElementById('answer-input').className = 'answer-input wrong';
    }

    document.getElementById('btn-check').disabled = true;
    document.getElementById('btn-next').style.display = 'block';
    document.getElementById('btn-toggle-sol').style.display = 'none';
    document.getElementById('info-card').className = 'info-card visible';
    fillInfoCard(qi);
    showSolutionLabel(qi);
  }

      solutionShown[qi] = true;
      inp.value = LABELS[qi];
      inp.className = 'answer-input correct';
      document.getElementById('photo-revealed').style.display = 'flex';
      document.getElementById('info-card').className = 'info-card visible';
      fillInfoCard(qi);
      btn.textContent = '👤 Meine Antwort zeigen';
    } else {
      solutionShown[qi] = false;
      inp.value = '';
      inp.className = 'answer-input';
      document.getElementById('photo-revealed').style.display = 'none';
      document.getElementById('info-card').className = 'info-card';
      btn.textContent = '💡 Lösung zeigen';
    }
  }

  function nextQuestion() {
    idx++;
    if (idx >= IMAGES.length) {
      showResults();
    } else {
      showQuestion();
    }
  }

  function showResults() {
    document.getElementById('question-card').style.display = 'none';
    document.getElementById('results').classList.add('visible');
    document.getElementById('progress-fill').style.width = '100%';

    const finalScore = lockedScore !== null ? lockedScore : score;
    const total = IMAGES.length;
    document.getElementById('result-score').textContent = finalScore + ' / ' + total;

    const pct = finalScore / total;
    let emoji = '😕', note = '';
    if (pct >= 0.9) { emoji = '🏆'; }
    else if (pct >= 0.7) { emoji = '🎉'; }
    else if (pct >= 0.5) { emoji = '👍'; }
    document.getElementById('result-emoji').textContent = emoji;

    if (lockedScore !== null) {
      note = `⚠️ XP-Wertung: ${lockedScore} / ${total} (Lösungshilfe genutzt – Punkte vor erster Hilfe gezählt)`;
    }
    document.getElementById('result-note').textContent = note;

    // XP vergeben
    if (typeof window.kolosseumReport === 'function')
      window.kolosseumReport(finalScore, total, QUIZ_SLUG);

    // Bestenliste laden
    loadLeaderboard();
  }

  async function saveScore() {
    const name = document.getElementById('lb-name-input').value.trim();
    if (!name) return;
    const finalScore = lockedScore !== null ? lockedScore : score;
    const status = document.getElementById('lb-status');
    status.textContent = 'Speichert …';
    try {
      if (typeof window.leaderboardSave === 'function') {
        const ok = await window.leaderboardSave(QUIZ_SLUG, name, finalScore, IMAGES.length);
        status.textContent = ok ? '✅ Gespeichert!' : '⚠️ Speichern fehlgeschlagen.';
      } else {
        status.textContent = '⚠️ Leaderboard nicht geladen.';
      }
    } catch(e) {
      status.textContent = '⚠️ Fehler: ' + e.message;
    }
    await loadLeaderboard();
  }

  async function loadLeaderboard() {
    const list = document.getElementById('lb-list');
    list.innerHTML = '<li style="color:var(--muted);font-size:0.85rem;padding:8px">Lädt …</li>';
    try {
      if (typeof window.leaderboardFetch === 'function') {
        const data = await window.leaderboardFetch(QUIZ_SLUG);
        if (typeof window.leaderboardHTML === 'function') {
          list.innerHTML = window.leaderboardHTML(data);
        } else {
          list.innerHTML = data.map((e,i) =>
            `<li><span class="lb-rank">${i+1}</span><span class="lb-name">${e.name}</span><span class="lb-pts">${e.score}/${e.total||IMAGES.length}</span></li>`
          ).join('');
        }
      }
    } catch(e) {
      list.innerHTML = `<li style="color:var(--muted);font-size:0.85rem;padding:8px">Bestenliste nicht verfügbar.</li>`;
    }
  }

  function openLeaderboard() {
    const w = window.open('', 'leaderboard',
      'width=460,height=600,scrollbars=yes,resizable=yes');
    w.document.write(`<!DOCTYPE html><html lang="de"><head>
      <meta charset="UTF-8">
      <title>Bestenliste – Lehrer*innenrätsel</title>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap">
      <style>body{font-family:Inter,sans-serif;background:#f0f4ff;color:#1e293b;padding:24px;}
      h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#2563eb;margin-bottom:16px;letter-spacing:2px;}
      ul{list-style:none;}li{display:flex;gap:10px;padding:10px 14px;background:#fff;border-radius:8px;margin-bottom:6px;font-size:0.9rem;}
      .rank{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#2563eb;min-width:22px;}
      .name{flex:1;font-weight:600;} .pts{color:#f59e0b;font-weight:700;}</style>
      </head><body><h2>🏆 Bestenliste</h2><ul id="ll">Lädt …</ul>
      <script>
      (async()=>{try{
        const r=await fetch('https://kolosseum.lehrer-herrmann.de/api/leaderboard/lehrer-rebus');
        const d=await r.json();
        document.getElementById('ll').innerHTML=d.map((e,i)=>
          '<li><span class="rank">'+(i+1)+'</span><span class="name">'+e.name+'</span><span class="pts">'+e.score+'/'+e.total+'</span></li>').join('');
      }catch(e){document.getElementById('ll').innerHTML='<li>Nicht verfügbar.</li>';}
      })();
      <\/script></body></html>`);
    w.document.close();
  }

  // Keyboard: Enter = Prüfen / Weiter
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const nextBtn = document.getElementById('btn-next');
    const checkBtn = document.getElementById('btn-check');
    if (nextBtn && nextBtn.style.display !== 'none') nextBtn.click();
    else if (checkBtn && !checkBtn.disabled) checkBtn.click();
  });

  // Hamburger
  document.getElementById('hamburger').addEventListener('click', function(){
    const links = document.getElementById('navbar-links');
    const open  = links.classList.toggle('open');
    this.setAttribute('aria-expanded', open);
  });
</script>

<script src="/js/supabase-config.js"></script>
<script src="/js/supabase-leaderboard.js"></script>
<script src="/js/kolosseum-prompt.js"></script>
</body>
</html>
