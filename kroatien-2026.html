<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>🌊 Kroatien 2026 – Packliste</title>
<style>
  :root {
    --blau:   #1a5f8a;
    --meer:   #2a9fd6;
    --orange: #e8851a;
    --gruen:  #2ecc71;
    --rot:    #e74c3c;
    --bg:     #eef7fb;
    --shadow: 0 2px 12px rgba(0,0,0,0.10);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: #222; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--blau) 0%, var(--meer) 100%);
    color: #fff; padding: 24px 20px 18px; text-align: center;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 3px 16px rgba(0,0,0,0.18);
  }
  header h1 { font-size: clamp(1.2rem, 4vw, 1.9rem); font-weight: 800; }
  header p  { font-size: .86rem; opacity: .8; margin-top: 4px; }
  #sync-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: .78rem; margin-top: 8px; opacity: .75;
  }
  #sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #aaa; transition: background .3s;
  }
  #sync-dot.ok    { background: var(--gruen); }
  #sync-dot.err   { background: var(--rot); }
  #sync-dot.busy  { background: var(--orange); animation: pulse .7s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── DUPLIKAT-WARNUNG ── */
  #warnung-box {
    display: none; background: #fff3cd; border-left: 4px solid #f0ad4e;
    padding: 12px 18px; margin: 14px auto; max-width: 1100px;
    border-radius: var(--radius); font-size: .88rem;
  }
  #warnung-box.sichtbar { display: block; }
  #warnung-box strong { color: #856404; }
  #warnung-liste { margin-top: 6px; padding-left: 18px; color: #6b500b; }

  /* ── HAUPT-LAYOUT ── */
  main { max-width: 1200px; margin: 0 auto; padding: 18px 12px 60px; }

  .familien-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 18px; align-items: start;
  }
  @media (max-width: 860px) { .familien-grid { grid-template-columns: 1fr; } }

  /* ── FAMILIEN-SPALTE ── */
  .familie-spalte { background: #fff; border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
  .familie-header { padding: 13px 18px; font-size: 1.05rem; font-weight: 800; color: #fff; text-align: center; }
  .familie-huette  .familie-header { background: linear-gradient(135deg, #1a5f8a, #2a9fd6); }
  .familie-berg    .familie-header { background: linear-gradient(135deg, #2d6a4f, #52b788); }
  .familie-hellern .familie-header { background: linear-gradient(135deg, #7b3f00, #e8851a); }
  .familie-body { padding: 14px; }

  /* ── RUBRIK ── */
  .rubrik { margin-bottom: 14px; }
  .rubrik-titel {
    font-size: .72rem; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: #888; margin-bottom: 7px;
    display: flex; align-items: center; gap: 6px;
  }
  .rubrik-titel::after { content: ''; flex: 1; height: 1px; background: #e8e8e8; }

  .item-liste { list-style: none; margin-bottom: 7px; }
  .item-liste li {
    display: flex; align-items: center; justify-content: space-between;
    background: #f7f9fb; border-radius: 6px; padding: 5px 9px;
    margin-bottom: 4px; font-size: .88rem;
  }
  .item-liste li.duplikat { background: #fff3cd; border-left: 3px solid #f0ad4e; }
  .item-liste li.duplikat .item-text::after { content: ' ⚠️'; }
  .item-text { flex: 1; }
  .del-btn {
    background: none; border: none; cursor: pointer; color: #bbb;
    font-size: 1rem; padding: 0 2px; line-height: 1; transition: color .12s;
  }
  .del-btn:hover { color: var(--rot); }

  .item-eingabe { display: flex; gap: 6px; }
  .item-eingabe input {
    flex: 1; padding: 6px 10px; border-radius: 7px; border: 1px solid #d8e3ea;
    font-size: .86rem; font-family: inherit; background: #f7f9fb; transition: border-color .15s;
  }
  .item-eingabe input:focus { outline: none; border-color: var(--meer); background: #fff; }
  .add-btn {
    background: var(--meer); color: #fff; border: none; border-radius: 7px;
    padding: 6px 12px; font-size: 1rem; cursor: pointer; font-weight: 700; transition: background .12s;
  }
  .add-btn:hover { background: var(--blau); }

  /* ── STATS ── */
  .stats-bar {
    text-align: center; margin-bottom: 16px; font-size: .82rem; color: #666;
    display: flex; gap: 18px; justify-content: center; flex-wrap: wrap;
  }
  .stats-bar strong { color: var(--blau); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #222; color: #fff; padding: 10px 22px; border-radius: 20px;
    font-size: .88rem; font-weight: 600; opacity: 0; transition: transform .3s, opacity .3s;
    pointer-events: none; z-index: 999; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>🌊 Kroatien 2026 – Packliste</h1>
  <p>Jede Familie trägt ein, was sie mitbringt — automatisch für alle sichtbar</p>
  <div id="sync-status"><span id="sync-dot"></span><span id="sync-text">Verbinde…</span></div>
</header>

<main>
  <div id="warnung-box"><strong>⚠️ Doppelte Einträge:</strong><ul id="warnung-liste"></ul></div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="familien-grid" id="familien-grid"></div>
</main>

<div id="toast"></div>

<script>
(function () {

  const API     = 'https://kolosseum.lehrer-herrmann.de/api/kroatien';
  const SECRET  = 'kroatien-sommer-2026';
  const HEADERS = { 'Content-Type': 'application/json', 'x-kroatien-secret': SECRET };

  const FAMILIEN = [
    { id: 'huette',  name: 'Familie Hütte',   emoji: '🏠' },
    { id: 'berg',    name: 'Familie Berg',     emoji: '⛰️' },
    { id: 'hellern', name: 'Familie Hellern',  emoji: '🌻' },
  ];
  const RUBRIKEN = [
    { id: 'elektro',  name: 'Elektro',   emoji: '🔌' },
    { id: 'kueche',   name: 'Küche',     emoji: '🍳' },
    { id: 'pool',     name: 'Pool',      emoji: '🏊' },
    { id: 'sport',    name: 'Sport',     emoji: '⚽' },
    { id: 'strand',   name: 'Strand',    emoji: '🏖️' },
    { id: 'essen',    name: 'Essen',     emoji: '🥗' },
    { id: 'trinken',  name: 'Trinken',   emoji: '🥤' },
    { id: 'spiele',   name: 'Spiele',    emoji: '🎲' },
    { id: 'kinder',   name: 'Kinder',    emoji: '🧸' },
    { id: 'medizin',  name: 'Medizin',   emoji: '💊' },
    { id: 'sonstiges',name: 'Sonstiges', emoji: '📦' },
  ];

  let state = leerenState();
  let speichernTimer = null;

  function leerenState() {
    const s = {};
    FAMILIEN.forEach(f => { s[f.id] = {}; RUBRIKEN.forEach(r => { s[f.id][r.id] = []; }); });
    return s;
  }

  function mergeInState(remote) {
    if (!remote || typeof remote !== 'object') return;
    FAMILIEN.forEach(f => {
      RUBRIKEN.forEach(r => {
        if (remote[f.id] && Array.isArray(remote[f.id][r.id])) {
          state[f.id][r.id] = remote[f.id][r.id];
        }
      });
    });
  }

  // ── Server-Kommunikation ────────────────────────────────────────────────
  function syncStatus(modus, text) {
    document.getElementById('sync-dot').className = modus;
    document.getElementById('sync-text').textContent = text;
  }

  async function laden() {
    syncStatus('busy', 'Lädt…');
    try {
      const res = await fetch(API, { headers: HEADERS });
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      mergeInState(data);
      syncStatus('ok', 'Verbunden · wird automatisch gespeichert');
      render();
    } catch(e) {
      syncStatus('err', 'Keine Verbindung – lokaler Modus');
      // Fallback: localStorage
      try {
        const raw = localStorage.getItem('kroatien_2026_v1');
        if (raw) mergeInState(JSON.parse(raw));
      } catch {}
      render();
    }
  }

  function speichernPlanen() {
    clearTimeout(speichernTimer);
    speichernTimer = setTimeout(speichernNow, 800);
  }

  async function speichernNow() {
    syncStatus('busy', 'Speichert…');
    // Immer auch lokal cachen
    try { localStorage.setItem('kroatien_2026_v1', JSON.stringify(state)); } catch {}
    try {
      const res = await fetch(API, {
        method: 'PUT', headers: HEADERS, body: JSON.stringify(state)
      });
      if (!res.ok) throw new Error(res.status);
      const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      syncStatus('ok', `Gespeichert um ${now}`);
    } catch(e) {
      syncStatus('err', 'Speichern fehlgeschlagen – Änderungen nur lokal');
    }
  }

  // ── Duplikat-Erkennung ──────────────────────────────────────────────────
  function duplikateErmitteln() {
    const vorkommen = {};
    FAMILIEN.forEach(f => {
      RUBRIKEN.forEach(r => {
        (state[f.id][r.id] || []).forEach(item => {
          const key = item.trim().toLowerCase();
          if (!key) return;
          if (!vorkommen[key]) vorkommen[key] = [];
          vorkommen[key].push({ fam: f.id, rub: r.id, orig: item });
        });
      });
    });
    return Object.entries(vorkommen)
      .filter(([, l]) => new Set(l.map(x => x.fam)).size > 1)
      .map(([key, liste]) => ({ key, liste }));
  }

  // ── Rendering ───────────────────────────────────────────────────────────
  function render() {
    const duplikate = duplikateErmitteln();
    const dupSet = new Set(duplikate.map(d => d.key));
    renderWarnungen(duplikate);
    renderStats();
    FAMILIEN.forEach(fam => {
      RUBRIKEN.forEach(rub => {
        const el = document.getElementById(`liste-${fam.id}-${rub.id}`);
        if (!el) return;
        el.innerHTML = '';
        (state[fam.id][rub.id] || []).forEach((item, idx) => {
          const key = item.trim().toLowerCase();
          const li = document.createElement('li');
          li.classList.toggle('duplikat', dupSet.has(key));
          li.innerHTML = `<span class="item-text">${esc(item)}</span>`
            + `<button class="del-btn" data-fam="${fam.id}" data-rub="${rub.id}" data-idx="${idx}" title="Entfernen">✕</button>`;
          el.appendChild(li);
        });
      });
    });
  }

  function renderWarnungen(duplikate) {
    const box = document.getElementById('warnung-box');
    if (!duplikate.length) { box.classList.remove('sichtbar'); return; }
    box.classList.add('sichtbar');
    document.getElementById('warnung-liste').innerHTML = duplikate.map(d => {
      const orte = d.liste.map(x => {
        const fNam = FAMILIEN.find(f => f.id === x.fam).name;
        const rNam = RUBRIKEN.find(r => r.id === x.rub).name;
        return `${fNam} (${rNam})`;
      }).join(' & ');
      return `<li><strong>${esc(d.liste[0].orig)}</strong> – ${esc(orte)}</li>`;
    }).join('');
  }

  function renderStats() {
    const bar = document.getElementById('stats-bar');
    const gesamt = FAMILIEN.reduce((acc, f) =>
      acc + RUBRIKEN.reduce((a, r) => a + (state[f.id][r.id] || []).length, 0), 0);
    bar.innerHTML = FAMILIEN.map(f => {
      const n = RUBRIKEN.reduce((a, r) => a + (state[f.id][r.id] || []).length, 0);
      return `<span>${f.emoji} <strong>${n}</strong></span>`;
    }).join(' · ') + ` · Gesamt: <strong>${gesamt}</strong>`;
  }

  // ── Grid aufbauen (einmalig) ────────────────────────────────────────────
  function aufbauen() {
    const grid = document.getElementById('familien-grid');
    FAMILIEN.forEach(fam => {
      const col = document.createElement('div');
      col.className = `familie-spalte familie-${fam.id}`;
      col.innerHTML = `<div class="familie-header">${fam.emoji} ${fam.name}</div>`;
      const body = document.createElement('div');
      body.className = 'familie-body';
      RUBRIKEN.forEach(rub => {
        const div = document.createElement('div');
        div.className = 'rubrik';
        div.innerHTML = `
          <div class="rubrik-titel">${rub.emoji} ${rub.name}</div>
          <ul class="item-liste" id="liste-${fam.id}-${rub.id}"></ul>
          <div class="item-eingabe">
            <input type="text" placeholder="Eintrag…"
              id="input-${fam.id}-${rub.id}"
              data-fam="${fam.id}" data-rub="${rub.id}" maxlength="80">
            <button class="add-btn" data-fam="${fam.id}" data-rub="${rub.id}">+</button>
          </div>`;
        body.appendChild(div);
      });
      col.appendChild(body);
      grid.appendChild(col);
    });
  }

  // ── Events ──────────────────────────────────────────────────────────────
  function eventsRegistrieren() {
    document.getElementById('familien-grid').addEventListener('click', e => {
      const delBtn = e.target.closest('.del-btn');
      if (delBtn) {
        const { fam, rub, idx } = delBtn.dataset;
        state[fam][rub].splice(+idx, 1);
        render(); speichernPlanen(); return;
      }
      const addBtn = e.target.closest('.add-btn');
      if (addBtn) { hinzufuegen(addBtn.dataset.fam, addBtn.dataset.rub); }
    });
    document.getElementById('familien-grid').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const input = e.target.closest('input[data-fam]');
        if (input) hinzufuegen(input.dataset.fam, input.dataset.rub);
      }
    });
  }

  function hinzufuegen(famId, rubId) {
    const input = document.getElementById(`input-${famId}-${rubId}`);
    const wert = input.value.trim();
    if (!wert) return;
    if (!state[famId][rubId]) state[famId][rubId] = [];
    const klein = wert.toLowerCase();
    if (state[famId][rubId].some(x => x.toLowerCase() === klein)) {
      toast('⚠️ Schon in dieser Rubrik vorhanden!');
      return;
    }
    state[famId][rubId].push(wert);
    input.value = '';
    render(); speichernPlanen();
    const dup = duplikateErmitteln().find(d => d.key === klein);
    if (dup) toast('⚠️ Dieser Artikel ist bei einer anderen Familie bereits eingetragen!');
  }

  // ── Toast ────────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Auto-Refresh alle 30 Sekunden ────────────────────────────────────────
  async function stiller_refresh() {
    // Nur laden wenn gerade kein unsaved Timer läuft
    if (speichernTimer) return;
    try {
      const res = await fetch(API, { headers: HEADERS });
      if (!res.ok) return;
      const data = await res.json();
      mergeInState(data);
      render();
    } catch {}
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  aufbauen();
  eventsRegistrieren();
  laden();
  setInterval(stiller_refresh, 30_000);

})();
</script>
</body>
</html>
