<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f0f4f8; --card:#fff; --text:#1e293b; --gray:#64748b; --border:#e2e8f0;
  --green:#16a34a; --red:#dc2626; --orange:#d97706; --accent:#2563eb; --r:14px;
  --c2:#3b82f6; --c3:#8b5cf6; --c4:#06b6d4; --c5:#f59e0b;
  --c6:#10b981; --c7:#f97316; --c8:#ec4899;
}
body { background:var(--bg); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       color:var(--text); min-height:100dvh; }

/* Header */
header { background:linear-gradient(135deg,#1e3a5f,#2563eb); color:#fff; padding:18px 20px 0; text-align:center; }
header h1 { font-size:1.35rem; font-weight:800; }
header p  { font-size:.88rem; opacity:.8; margin:4px 0 14px; }

.cat-scroll { display:flex; gap:8px; overflow-x:auto; padding:0 16px 14px; scrollbar-width:none; }
.cat-scroll::-webkit-scrollbar { display:none; }
.cat-tab {
  flex:0 0 auto; padding:8px 16px; border-radius:99px; border:2px solid transparent;
  background:rgba(255,255,255,.15); color:#fff; font-weight:700; font-size:.85rem;
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.cat-tab:hover { background:rgba(255,255,255,.28); }
.cat-tab.active { background:#fff; color:#1e3a5f; }

/* Main */
main { padding:16px; max-width:580px; margin:0 auto; }
.panel { display:none; }
.panel.active { display:block; }

/* Strategy tip */
.tip-box {
  border-radius:10px; padding:12px 16px; margin-bottom:14px;
  font-size:.88rem; line-height:1.55; border-left:4px solid;
}
.tip-box strong { display:block; font-size:.75rem; text-transform:uppercase;
                  letter-spacing:.06em; margin-bottom:4px; opacity:.7; }

/* Mode switcher */
.mode-row { display:flex; gap:8px; margin-bottom:16px; }
.mode-btn {
  flex:1; padding:10px; border:1.5px solid var(--border); border-radius:10px;
  background:#fff; font-weight:600; font-size:.88rem; cursor:pointer; transition:all .18s;
  text-align:center;
}
.mode-btn.active { border-color:var(--accent); background:var(--accent); color:#fff; }

/* Exercise card */
.ex-card {
  background:var(--card); border-radius:var(--r);
  box-shadow:0 2px 10px rgba(0,0,0,.08); padding:22px 20px; margin-bottom:14px;
}
.prog-row { display:flex; justify-content:space-between; align-items:center;
            margin-bottom:10px; font-size:.8rem; color:var(--gray); }
.prog-bar { background:var(--border); border-radius:99px; height:5px; margin-bottom:16px; overflow:hidden; }
.prog-fill { height:100%; border-radius:99px; background:var(--accent); transition:width .3s; }

/* Lückentext */
.item-word {
  font-size:1.5rem; font-weight:700; text-align:center; margin:10px 0 22px;
  display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:2px; min-height:48px;
}
.blank { display:inline-block; border-bottom:3px solid var(--accent); min-width:36px; text-align:center; }
.blank.ok  { color:var(--green); border-color:var(--green); }
.blank.err { color:var(--red);   border-color:var(--red); text-decoration:line-through; }

.opt-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.opt-btn {
  padding:16px 8px; border:2px solid var(--border); border-radius:12px;
  background:#fff; font-size:1.2rem; font-weight:700; cursor:pointer;
  transition:all .15s; text-align:center;
}
.opt-btn:hover:not(:disabled) { border-color:var(--accent); background:#eff6ff; }
.opt-btn.correct { background:#dcfce7; border-color:var(--green); color:var(--green); }
.opt-btn.wrong   { background:#fee2e2; border-color:var(--red);   color:var(--red); }
.opt-btn:disabled { cursor:default; }

/* Fehlersuche */
.satz-box {
  font-size:1.1rem; font-weight:500; text-align:center; padding:16px 10px 20px;
  line-height:1.6; min-height:72px;
}
.yw-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
.yw-btn {
  padding:16px; border:2px solid var(--border); border-radius:12px;
  font-size:1.05rem; font-weight:700; cursor:pointer; transition:all .15s;
}
.yw-btn:hover:not(:disabled) { filter:brightness(.96); }
.yw-btn.richtig-btn { background:#dcfce7; border-color:#86efac; color:var(--green); }
.yw-btn.falsch-btn  { background:#fee2e2; border-color:#fca5a5; color:var(--red); }
.yw-btn.correct { box-shadow:0 0 0 3px rgba(22,163,74,.4); }
.yw-btn.wrong   { opacity:.5; }
.yw-btn:disabled { cursor:default; }

.erklaerung {
  margin-top:12px; padding:10px 14px; border-radius:10px;
  font-size:.88rem; line-height:1.5; display:none;
}
.erklaerung.show { display:block; }
.erklaerung.ok  { background:#dcfce7; color:#14532d; }
.erklaerung.err { background:#fee2e2; color:#7f1d1d; }

/* Feedback & weiter */
.fb-bar {
  margin-top:12px; padding:9px 14px; border-radius:10px;
  font-weight:600; font-size:.9rem; text-align:center; display:none;
}
.fb-bar.ok  { display:block; background:#dcfce7; color:var(--green); }
.fb-bar.err { display:block; background:#fee2e2; color:var(--red); }

.next-btn {
  display:none; width:100%; margin-top:12px; padding:12px;
  background:var(--border); border:none; border-radius:10px;
  font-weight:600; font-size:.95rem; cursor:pointer;
}
.next-btn:hover { background:#cbd5e1; }

/* Ergebnis */
.result-card {
  background:var(--card); border-radius:var(--r);
  box-shadow:0 2px 10px rgba(0,0,0,.08); padding:28px 24px; text-align:center;
}
.result-card h2 { font-size:1.3rem; margin-bottom:6px; }
.result-card .score { font-size:3rem; font-weight:800; margin:12px 0 4px; }
.result-card .sub  { color:var(--gray); font-size:.9rem; margin-bottom:20px; }
.result-msg { padding:12px 16px; border-radius:10px; font-size:.95rem; line-height:1.5; margin-bottom:16px; }
.result-msg.ok  { background:#dcfce7; color:#14532d; }
.result-msg.mid { background:#fef9c3; color:#854d0e; }
.result-msg.bad { background:#fee2e2; color:#7f1d1d; }
.retry-btn {
  width:100%; padding:13px; border:none; border-radius:10px;
  background:var(--accent); color:#fff; font-weight:700; font-size:1rem; cursor:pointer;
}
.retry-btn:hover { filter:brightness(1.07); }
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// ÜBUNGSDATEN
// Lückentext: {v, n, a, b, k}  – gleiche Struktur wie Selbsttest
// Fehlersuche: {satz, ok, erklaerung}  ok=true → Satz richtig, ok=false → Fehler vorhanden
// ═══════════════════════════════════════════════════════════════════════════════
const DATA = {

2: {
  name:"Doppelkonsonanten", kuerzel:"DK", farbe:"var(--c2)",
  tipp:"🔁 Verlängern: Kurzer Vokal vor der Lücke → Konsonant verdoppeln.\nLanger Vokal oder Diphthong → kein Doppel.",
  tipp_bg:"#eff6ff", tipp_border:"var(--c2)",
  luecke:[
    {v:"der Ham",n:"er",a:"m",b:"mm",k:"b"},
    {v:"das Ki",n:"en",a:"s",b:"ss",k:"b"},
    {v:"die Tel",n:"er",a:"l",b:"ll",k:"b"},
    {v:"die Grip",n:"e",a:"p",b:"pp",k:"b"},
    {v:"der Mo",n:"d",a:"n",b:"nn",k:"a"},
    {v:"der Sa",n:"",a:"k",b:"ck",k:"b"}
  ],
  fehler:[
    {satz:"Er schlägt mit dem Hamer auf den Nagel.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>Hammer</strong> (kurzes a → mm)"},
    {satz:"Das Kissen liegt auf dem Sofa.",ok:true,erklaerung:"✓ Richtig geschrieben!"},
    {satz:"Im Somer fahren wir ans Meer.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>Sommer</strong> (kurzes o → mm)"},
    {satz:"Der Hund schläft unter dem Tisch.",ok:true,erklaerung:"✓ Richtig geschrieben!"}
  ]

3: {
  name:"s / ß / ss", kuerzel:"s/ß", farbe:"var(--c3)",
  tipp:"🔁 Verlängern: Kurzer Vokal vor dem Laut → ss. Langer Vokal oder Diphthong (ei, au, eu) → ß.",
  tipp_bg:"#f5f3ff", tipp_border:"var(--c3)",
  luecke:[
    {v:"die Stra",n:"e",a:"ss",b:"ß",k:"b"},
    {v:"der Flu",n:"",a:"ss",b:"ß",k:"a"},
    {v:"hei",n:"",a:"ss",b:"ß",k:"b"},
    {v:"die Kla",n:"e",a:"ss",b:"ß",k:"a"},
    {v:"der Spa",n:"",a:"ss",b:"ß",k:"b"},
    {v:"er i",n:"t",a:"ss",b:"ß",k:"a"}
  ],
  fehler:[
    {satz:"Die Straße führt durch den Wald.",ok:true,erklaerung:"✓ Richtig geschrieben!"},
    {satz:"Der Flus fließt ins Meer.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>Fluss</strong> (kurzes u → ss)"},
    {satz:"Das Wasser ist sehr heiss.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>heiß</strong> (Diphthong ei → ß)"},

  ]
},

4: {
  name:"Auslautverhärtung", kuerzel:"AK", farbe:"var(--c4)",
  tipp:"🔀 Ableiten: Bilde Plural oder eine verlängerte Form. Dann hörst du, ob b/d/g oder p/t/k richtig ist.",
  tipp_bg:"#ecfeff", tipp_border:"var(--c4)",
  luecke:[
    {v:"der Hun",n:"",a:"t",b:"d",k:"b"},
    {v:"der Wal",n:"",a:"t",b:"d",k:"b"},
    {v:"das Ra",n:"",a:"t",b:"d",k:"b"},
    {v:"der Die",n:"",a:"p",b:"b",k:"b"},
    {v:"das Gel",n:"",a:"t",b:"d",k:"b"},
    {v:"das Lo",n:"",a:"p",b:"b",k:"b"}
  ],
  fehler:[
    {satz:"Das Rat dreht sich im Schlamm.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>Rad</strong> → Räder → d"},
    {satz:"Der Hund bellt laut.",ok:true,erklaerung:"✓ Richtig geschrieben!"},
    {satz:"Er verdient viel Gelt.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>Geld</strong> → Gelder → d"},
    {satz:"Der Dieb wurde gefasst.",ok:true,erklaerung:"✓ Richtig geschrieben!"}
  ]
},

5: {
  name:"ä und äu – Umlautableitung", kuerzel:"ä/äu", farbe:"var(--c5)",
  tipp:"🔀 Ableiten: Steckt ein a in der Grundform? → ä. Steckt au drin? → äu. Sonst: e oder eu.",
  tipp_bg:"#fffbeb", tipp_border:"var(--c5)",
  luecke:[
    {v:"die H",n:"nde",a:"ä",b:"e",k:"a"},
    {v:"die H",n:"user",a:"eu",b:"äu",k:"b"},
    {v:"die B",n:"ume",a:"eu",b:"äu",k:"b"},
    {v:"die Tr",n:"ume",a:"eu",b:"äu",k:"b"},
    {v:"m",n:"chtig",a:"ä",b:"e",k:"a"},
    {v:"tats",n:"chlich",a:"ä",b:"e",k:"a"}
  ],
  fehler:[
    {satz:"Die Hände sind eiskalt.",ok:true,erklaerung:"✓ Richtig geschrieben!"},
    {satz:"Die Beume im Park sind riesig.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>Bäume</strong> (Baum → au → äu)"},
    {satz:"Er hatte viele schöne Treume.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>Träume</strong> (Traum → au → äu)"},
    {satz:"Die Häuser in der Altstadt sind alt.",ok:true,erklaerung:"✓ Richtig geschrieben!"}
  ]
},

6: {
  name:"Zusammensetzungen", kuerzel:"ZW", farbe:"var(--c6)",
  tipp:"🧩 Zerlegen: Trenne das Wort in seine Teile. Schreibe beide Teile vollständig – kein Buchstabe geht verloren.",
  tipp_bg:"#ecfdf5", tipp_border:"var(--c6)",
  luecke:[
    {v:"die Tenni",n:"ocke",a:"s",b:"ss",k:"b"},
    {v:"das Schlüsse",n:"och",a:"l",b:"ll",k:"b"},
    {v:"die Schi",n:"ahrt",a:"ff",b:"fff",k:"b"},
    {v:"die Hau",n:"uhe",a:"sch",b:"ssch",k:"b"},
    {v:"das Motor",n:"ad",a:"r",b:"rr",k:"b"},
    {v:"a",n:"sehen",a:"n",b:"nn",k:"a"}
  ],
  fehler:[
    {satz:"Die Tenissocke hat ein Loch.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>Tennissocke</strong> (Tennis + Socke → ss)"},
    {satz:"Das Motorrad ist sehr schnell.",ok:true,erklaerung:"✓ Richtig geschrieben!"},
    {satz:"Er öffnet das Schlüsseloch.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>Schlüsselloch</strong> (Schlüssel + Loch → ll)"},
    {satz:"Die Schifffahrt beginnt um 9 Uhr.",ok:true,erklaerung:"✓ Richtig geschrieben!"}
  ]
},

7: {
  name:"Ableitungen & Vorsilben", kuerzel:"AE", farbe:"var(--c7)",
  tipp:"🧩 Zerlegen: Erkenne die Vorsilbe (ver-, vor-, ab-, miss-, ent-). Sie wird immer gleich geschrieben.",
  tipp_bg:"#fff7ed", tipp_border:"var(--c7)",
  luecke:[
    {v:"",n:"erbieten",a:"V",b:"F",k:"a"},
    {v:"un",n:"orsichtig",a:"v",b:"f",k:"a"},
    {v:"ent",n:"ernen",a:"f",b:"v",k:"a"},
    {v:"das ",n:"geschick",a:"Mis",b:"Miss",k:"b"},
    {v:"",n:"geben",a:"ab",b:"ap",k:"a"},
    {v:"",n:"beikommen",a:"vor",b:"vorr",k:"a"}
  ],
  fehler:[

    {satz:"Sie nimmt an der Feranstaltung teil.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>Veranstaltung</strong> (Vorsilbe ver-)"},
    {satz:"Das Missverständnis wurde geklärt.",ok:true,erklaerung:"✓ Richtig geschrieben!"},
    {satz:"Er hat die Aufgabe abgegeben.",ok:true,erklaerung:"✓ Richtig geschrieben!"}
  ]
},

8: {
  name:"Groß- und Kleinschreibung", kuerzel:"GK", farbe:"var(--c8)",
  tipp:"🧩 Zerlegen / Artikel-Probe: Passt ein Artikel (der/die/das/ein) davor? → Nomen → Großschreiben.",
  tipp_bg:"#fdf2f8", tipp_border:"var(--c8)",
  luecke:[
    {v:"die ",n:"icherheit",a:"S",b:"s",k:"a"},
    {v:"beim ",n:"aufen",a:"L",b:"l",k:"a"},
    {v:"",n:"reckig",a:"d",b:"D",k:"a"},
    {v:"die ",n:"reiheit",a:"F",b:"f",k:"a"},
    {v:"",n:"ündlich",a:"m",b:"M",k:"a"},
    {v:"das ",n:"lück",a:"G",b:"g",k:"a"}
  ],
  fehler:[
    {satz:"Sie lernt mit großem Eifer.",ok:true,erklaerung:"✓ Richtig geschrieben!"},
    {satz:"Das laufen macht ihr viel Spaß.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>Laufen</strong> (nominalisierter Infinitiv → Nomen → Groß)"},
    {satz:"Er ist immer sehr pünktlich.",ok:true,erklaerung:"✓ Richtig geschrieben!"},
    {satz:"Das glück ist auf ihrer Seite.",ok:false,erklaerung:"❌ Falsch – richtig: <strong>Glück</strong> (Nomen → Groß)"}

}; // end DATA

// ═══════════════════════════════════════════════════════════════════════════════
// App-State
// ═══════════════════════════════════════════════════════════════════════════════
let state = { cat:2, mode:"luecke", idx:0, score:0, done:false };

// ── Kategorie wechseln ───────────────────────────────────────────────────────
function showCat(n, btn) {
  document.querySelectorAll(".cat-tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  btn.scrollIntoView({behavior:"smooth", block:"nearest", inline:"center"});
  state.cat = n; state.mode = "luecke"; state.idx = 0; state.score = 0; state.done = false;
  render();
  window.scrollTo({top:0, behavior:"smooth"});
}

// ── Modus wechseln ───────────────────────────────────────────────────────────
function setMode(m) {
  state.mode = m; state.idx = 0; state.score = 0; state.done = false;
  render();
}

// ── Haupt-Render ─────────────────────────────────────────────────────────────
function render() {
  const d   = DATA[state.cat];
  const items = state.mode === "luecke" ? d.luecke : d.fehler;
  const area  = document.getElementById("ex-area");

  if (state.done) { renderResult(area, d, items); return; }

  const item = items[state.idx];
  const pct  = (state.idx / items.length * 100).toFixed(0);

  let html = `
    <!-- Tipp -->
    <div class="tip-box" style="background:${d.tipp_bg};border-color:${d.tipp_border}">
      <strong>Strategie-Tipp</strong>${d.tipp.replace(/\n/g,"<br>")}
    </div>
    <!-- Modus-Wahl -->
    <div class="mode-row">
      <button class="mode-btn ${state.mode==="luecke"?"active":""}" onclick="setMode('luecke')">✏️ Lückentext</button>
      <button class="mode-btn ${state.mode==="fehler"?"active":""}" onclick="setMode('fehler')">🔍 Fehlersuche</button>
    </div>
    <!-- Aufgaben-Karte -->
    <div class="ex-card">
      <div class="prog-row">
        <span style="font-weight:600;color:${d.farbe}">${d.kuerzel}</span>
        <span>Aufgabe ${state.idx+1} / ${items.length}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${d.farbe}"></div></div>
  `;

  if (state.mode === "luecke") {
    html += renderLuecke(item, d);
  } else {
    html += renderFehler(item, d);
  }

  html += `
      <div class="fb-bar" id="fb"></div>
      <button class="next-btn" id="next-btn" onclick="nextItem()">
        ${state.idx < items.length-1 ? "Weiter →" : "Ergebnis ansehen →"}
      </button>
    </div>`;

  area.innerHTML = html;
}

function renderLuecke(item, d) {
  return `
    <div class="item-word" id="item-word">
      ${item.v ? `<span>${item.v}</span>` : ""}
      <span class="blank" id="blank">___</span>
      ${item.n ? `<span>${item.n}</span>` : ""}
    </div>
    <div class="opt-row">
      <button class="opt-btn" id="btn-a" onclick="answerLuecke('a')">${item.a}</button>
      <button class="opt-btn" id="btn-b" onclick="answerLuecke('b')">${item.b}</button>
    </div>`;
}

function renderFehler(item, d) {
  return `
    <div class="satz-box" id="satz-box">${item.satz}</div>
    <div class="yw-row">
      <button class="yw-btn richtig-btn" id="btn-r" onclick="answerFehler(true)">✓ Richtig</button>
      <button class="yw-btn falsch-btn"  id="btn-f" onclick="answerFehler(false)">✗ Falsch</button>
    </div>
    <div class="erklaerung" id="erklaerung">${item.erklaerung}</div>`;
}

// ── Antworten ────────────────────────────────────────────────────────────────
function answerLuecke(choice) {
  const d     = DATA[state.cat];
  const items = d.luecke;
  const item  = items[state.idx];
  const correct = choice === item.k;

  document.getElementById("btn-a").disabled = true;
  document.getElementById("btn-b").disabled = true;
  document.getElementById("btn-" + choice).classList.add(correct ? "correct" : "wrong");
  if (!correct) document.getElementById("btn-" + item.k).classList.add("correct");

  const blank = document.getElementById("blank");
  blank.textContent = item[choice];
  blank.className   = "blank " + (correct ? "ok" : "err");

  const fb = document.getElementById("fb");
  if (correct) {
    fb.textContent = "✓ Richtig!";   fb.className = "fb-bar ok";
    state.score++;
  } else {
    fb.textContent = `✗ Richtig wäre: ${item[item.k]}`;  fb.className = "fb-bar err";
  }
  document.getElementById("next-btn").style.display = "block";
}

function answerFehler(userSaysOk) {
  const items = DATA[state.cat].fehler;
  const item  = items[state.idx];
  const correct = userSaysOk === item.ok;

  document.getElementById("btn-r").disabled = true;
  document.getElementById("btn-f").disabled = true;

  if (correct) {
    const btnId = userSaysOk ? "btn-r" : "btn-f";
    document.getElementById(btnId).classList.add("correct");
    state.score++;
  } else {
    const wrongId   = userSaysOk ? "btn-r" : "btn-f";
    const correctId = userSaysOk ? "btn-f" : "btn-r";
    document.getElementById(wrongId).classList.add("wrong");
    document.getElementById(correctId).classList.add("correct");
  }

  const el = document.getElementById("erklaerung");
  el.className = "erklaerung show " + (item.ok ? "ok" : "err");

  document.getElementById("next-btn").style.display = "block";
}

function nextItem() {
  const items = state.mode === "luecke" ? DATA[state.cat].luecke : DATA[state.cat].fehler;
  state.idx++;
  if (state.idx >= items.length) { state.done = true; }
  render();
}

// ── Ergebnis ─────────────────────────────────────────────────────────────────
function renderResult(area, d, items) {
  const n   = items.length;
  const pct = Math.round(state.score / n * 100);
  let msgClass, msgText;
  if (pct === 100) {
    msgClass = "ok";  msgText = "Perfekt! Alle Aufgaben richtig. 🎉";
  } else if (pct >= 60) {
    msgClass = "mid"; msgText = "Gut! Schau dir die falsch beantworteten Aufgaben noch einmal an.";
  } else {
    msgClass = "bad"; msgText = "Noch etwas Übung nötig. Schau zuerst nochmal in die Strategieerklärung!";
  }

  const modeLabel = state.mode === "luecke" ? "Lückentext" : "Fehlersuche";

  area.innerHTML = `
    <div class="tip-box" style="background:${d.tipp_bg};border-color:${d.tipp_border}">
      <strong>Strategie-Tipp</strong>${d.tipp.replace(/\n/g,"<br>")}
    </div>
    <div class="mode-row">
      <button class="mode-btn ${state.mode==="luecke"?"active":""}" onclick="setMode('luecke')">✏️ Lückentext</button>
      <button class="mode-btn ${state.mode==="fehler"?"active":""}" onclick="setMode('fehler')">🔍 Fehlersuche</button>
    </div>
    <div class="result-card">
      <h2>${d.name}</h2>
      <p style="color:var(--gray);font-size:.85rem;margin-bottom:8px">${modeLabel}</p>
      <div class="score" style="color:${d.farbe}">${state.score}/${n}</div>
      <div class="sub">${pct} % richtig</div>
      <div class="result-msg ${msgClass}">${msgText}</div>
      <button class="retry-btn" onclick="retry()">↺ Nochmal üben</button>

      ${state.mode==="luecke"
        ? `<button class="retry-btn" style="margin-top:10px;background:var(--gray)" onclick="setMode('fehler')">🔍 Jetzt Fehlersuche</button>`
        : `<button class="retry-btn" style="margin-top:10px;background:var(--gray)" onclick="setMode('luecke')">✏️ Jetzt Lückentext</button>`
      }
    </div>`;
}

function retry() {
  state.idx = 0; state.score = 0; state.done = false;
  render();
}

// ── Initialisierung + Hash-Routing ──────────────────────────────────────────
(function init() {
  const hash = parseInt(location.hash.replace("#",""));
  if (hash >= 2 && hash <= 8 && DATA[hash]) {
    state.cat = hash;
  }
  render();
  // Tab optisch anpassen nach render
  document.querySelectorAll(".cat-tab").forEach(t => {
    t.classList.remove("active");
    if (hash >= 2 && hash <= 8 && t.getAttribute("onclick") &&
        t.getAttribute("onclick").includes("showCat(" + hash + ",")) {
      t.classList.add("active");
    }
  });
})();
</script>
