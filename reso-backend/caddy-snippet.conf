# Diesen Block in deinen bestehenden Caddyfile-Block für lehrer-herrmann.de einfügen.
# Danach: caddy reload  (oder: systemctl reload caddy)
#
# Beispiel-Struktur des Caddyfile:
#
# lehrer-herrmann.de {
#     ...bestehende Einträge...
#
#     handle_path /reso-api/* {
#         reverse_proxy localhost:8400
#     }
# }

handle_path /reso-api/* {
    reverse_proxy localhost:8400
}
