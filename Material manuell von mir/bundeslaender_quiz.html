<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stumme Karte – Bundesländer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;padding:12px;color:#222}
h1{font-size:17px;font-weight:700;margin-bottom:10px}
.mode-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.mode-btn{padding:6px 16px;border:1.5px solid #aaa;border-radius:8px;background:#fff;color:#555;font-size:13px;cursor:pointer}
.mode-btn.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:600}
.mode-hint{font-size:12px;color:#888;margin-left:4px}
.bank{display:flex;flex-wrap:wrap;gap:6px;padding:8px;min-height:44px;border:1.5px dashed #aac;border-radius:8px;margin-bottom:10px;background:#f0f4ff}
.tag{padding:4px 12px;border-radius:20px;background:#fff;border:1px solid #aac;font-size:12px;cursor:grab;color:#223;white-space:nowrap}
.tag.used{opacity:.22;pointer-events:none}
.map-wrap{position:relative;display:inline-block;border:1px solid #ccc;border-radius:10px;overflow:hidden;max-width:100%;background:#f8f8f4}
.map-wrap img{display:block;width:100%;max-width:713px;height:auto}
.dot{position:absolute;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#185FA5;border:2px solid #fff;cursor:pointer;z-index:10}
.dot.ok{background:#2d7a2d}
.dot.fail{background:#b82222}
.popup{position:absolute;z-index:30;background:#fff;border:1px solid #bbb;border-radius:8px;padding:8px;min-width:190px;box-shadow:0 2px 8px rgba(0,0,0,.13)}
.popup-opts{display:flex;flex-direction:column;gap:4px}
.pop-btn{padding:6px 10px;border-radius:6px;border:1px solid #ddd;background:#f9f9f9;font-size:13px;cursor:pointer;text-align:left}
.pop-btn:hover{background:#ddeeff}
.pop-btn.ok{background:#d4edda;border-color:#2d7a2d;color:#1a4d1a;font-weight:600}
.pop-btn.fail{background:#fcdede;border-color:#b82222;color:#6b0000}
.dz{position:absolute;transform:translate(-50%,-50%);z-index:10}
.dz-lbl{font-size:11px;background:rgba(255,255,255,.93);border:1.5px dashed #185FA5;border-radius:5px;padding:3px 7px;color:#185FA5;min-width:90px;text-align:center;white-space:nowrap}
.dz-lbl.filled{border-style:solid;border-color:#2d7a2d;color:#1a4d1a;background:rgba(212,237,218,.95)}
.dz-lbl.wrong{border-color:#b82222;color:#6b0000;background:rgba(252,222,222,.95)}
.hz{position:absolute;transform:translate(-50%,-50%);z-index:10}
.hz input{font-size:11px;width:140px;padding:3px 6px;border:1.5px solid #185FA5;border-radius:5px;background:rgba(255,255,255,.93);color:#222;text-align:center}
.hz input.ok{border-color:#2d7a2d;background:rgba(212,237,218,.92);color:#1a4d1a}
.hz input.fail{border-color:#b82222;background:rgba(252,222,222,.92);color:#6b0000}
.btn-row{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.btn-check{padding:7px 18px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.btn-sec{padding:7px 14px;background:#eee;color:#444;border:1px solid #bbb;border-radius:8px;font-size:13px;cursor:pointer}
.progress{height:6px;border-radius:3px;background:#ddd;margin-top:8px;overflow:hidden;display:none}
.progress-bar{height:100%;background:#185FA5;border-radius:3px;transition:width .3s}
.score{margin-top:8px;font-size:14px;color:#555}
.score strong{color:#222}
</style>
</head>

const HINTS={easy:"4 Auswahloptionen · Sofort-Feedback",medium:"Alle Begriffe per Drag & Drop · Auswertung auf Knopfdruck",hard:"Freie Eingabe · Auswertung auf Knopfdruck"};
let mode="easy",state={},popup=null,drag=null;
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function opts(correct,all){const o=shuffle(all.filter(l=>l!==correct));return shuffle([correct,...o.slice(0,3)])}
function setMode(m){mode=m;document.querySelectorAll(".mode-btn").forEach((b,i)=>b.classList.toggle("active",["easy","medium","hard"][i]===m));document.getElementById("mhint").textContent=HINTS[m];init()}
function init(){
  state={};HS.forEach(h=>state[h.id]={answer:"",done:false});popup=null;drag=null;
  document.getElementById("mapimg").src=STUMM;
  document.getElementById("score").innerHTML="";
  document.getElementById("prog").style.display="none";
  document.getElementById("pbar").style.width="0%";
  buildUI();
}
function buildUI(){
  const w=document.getElementById("mapwrap");
  w.querySelectorAll(".dot,.popup,.dz,.hz").forEach(e=>e.remove());
  document.getElementById("bank-wrap").innerHTML="";
  const all=HS.map(h=>h.label);
  const br=document.getElementById("btnrow");
  if(mode==="medium"){
    br.style.display="flex";
    const bank=document.createElement("div");bank.className="bank";bank.id="bank";
    shuffle(all).forEach(lbl=>{
      const t=document.createElement("div");t.className="tag";t.textContent=lbl;t.draggable=true;t.dataset.label=lbl;
      t.addEventListener("dragstart",e=>{drag=lbl;e.dataTransfer.effectAllowed="move"});
      t.addEventListener("touchstart",()=>drag=lbl,{passive:true});
      bank.appendChild(t);
    });
    document.getElementById("bank-wrap").appendChild(bank);
  } else if(mode==="hard"){br.style.display="flex";}
  else br.style.display="none";
  HS.forEach(h=>{
    if(mode==="easy"){
      const el=document.createElement("div");el.className="dot";el.id="dot-"+h.id;
      el.style.left=h.x+"%";el.style.top=h.y+"%";
      el.onclick=e=>{e.stopPropagation();if(!state[h.id].done)openPop(h,el,all)};
      w.appendChild(el);
    } else if(mode==="medium"){
      const dz=document.createElement("div");dz.className="dz";dz.style.left=h.x+"%";dz.style.top=h.y+"%";
      const lbl=document.createElement("div");lbl.className="dz-lbl";lbl.id="dz-"+h.id;lbl.textContent="?";
      dz.appendChild(lbl);
      const drop=()=>{
        if(!drag)return;
        const prev=state[h.id].answer;
        if(prev){const ot=document.querySelector("#bank .tag[data-label='"+prev+"']");if(ot)ot.classList.remove("used")}
        state[h.id].answer=drag;lbl.textContent=drag;lbl.className="dz-lbl filled";
        const ut=document.querySelector("#bank .tag[data-label='"+drag+"']");if(ut)ut.classList.add("used");
        drag=null;
      };
      dz.addEventListener("dragover",e=>e.preventDefault());
      dz.addEventListener("drop",e=>{e.preventDefault();drop()});
      dz.addEventListener("touchend",drop);
      w.appendChild(dz);
    } else {
      const hz=document.createElement("div");hz.className="hz";hz.style.left=h.x+"%";hz.style.top=h.y+"%";
      const inp=document.createElement("input");inp.type="text";inp.placeholder="?";inp.autocomplete="off";inp.id="hi-"+h.id;
      inp.addEventListener("input",()=>state[h.id].answer=inp.value.trim());
      hz.appendChild(inp);w.appendChild(hz);
    }
  });
  w.onclick=()=>{if(popup){popup.remove();popup=null}};
}
function openPop(h,dot,all){
  if(popup){popup.remove();popup=null}
  const o=opts(h.label,all);
  const p=document.createElement("div");p.className="popup";
  const list=document.createElement("div");list.className="popup-opts";
  o.forEach(opt=>{
    const b=document.createElement("button");b.className="pop-btn";b.textContent=opt;
    b.onclick=e=>{
      e.stopPropagation();
      const ok=opt===h.label;
      b.className="pop-btn "+(ok?"ok":"fail");
      if(!ok)list.querySelectorAll(".pop-btn").forEach(x=>{if(x.textContent===h.label)x.className="pop-btn ok"});
      dot.className="dot "+(ok?"ok":"fail");
      state[h.id].done=true;state[h.id].answer=opt;
      list.querySelectorAll(".pop-btn").forEach(x=>x.disabled=true);
      updProg();
    };
    list.appendChild(b);
  });
  p.appendChild(list);
  dot.parentNode.appendChild(p);
  p.style.left=(parseFloat(h.x)>70?"-200px":"14px");
  p.style.top=(parseFloat(h.y)>80?"-130px":"-5px");
  popup=p;
}
function checkAll(){
  let c=0;
  HS.forEach(h=>{
    const ans=(state[h.id].answer||"").trim();
    const ok=ans.toLowerCase()===h.label.toLowerCase();
    if(mode==="medium"){const el=document.getElementById("dz-"+h.id);if(el)el.className="dz-lbl "+(ok?"filled":"wrong")}
    else{const el=document.getElementById("hi-"+h.id);if(el)el.className=ok?"ok":"fail"}
    if(ok)c++;
  });
  const pct=Math.round(c/HS.length*100);
  const em=pct===100?"&#127881;":pct>=80?"&#128077;":pct>=50?"&#128578;":"&#128170;";
  document.getElementById("score").innerHTML=em+" Ergebnis: <strong>"+c+" / "+HS.length+" richtig</strong> ("+pct+"%)";
}
function updProg(){
  let done=0,c=0;
  HS.forEach(h=>{if(state[h.id].done){done++;if(state[h.id].answer===h.label)c++}});
  const pg=document.getElementById("prog");pg.style.display="block";
  document.getElementById("pbar").style.width=(done/HS.length*100)+"%";
  const s=document.getElementById("score");
  s.innerHTML="Fortschritt: <strong>"+c+"/"+done+"</strong> richtig ("+HS.length+" gesamt)";
  if(done===HS.length){
    const pct=Math.round(c/HS.length*100);
    const em=pct===100?"&#127881;":pct>=80?"&#128077;":pct>=50?"&#128578;":"&#128170;";
    s.innerHTML=em+" Fertig! <strong>"+c+"/"+HS.length+"</strong> richtig ("+pct+"%)";
  }
}
function showLsg(){
  document.getElementById("mapimg").src=LOESUNG;
  document.getElementById("mapwrap").querySelectorAll(".dot,.dz,.hz,.popup").forEach(e=>e.style.display="none");
  document.getElementById("score").innerHTML="<em>Lösung wird angezeigt.</em> <button onclick='init()' style='margin-left:8px;padding:3px 10px;border-radius:6px;border:1px solid #bbb;cursor:pointer;font-size:12px'>↩ Zurück</button>";
}
init();
</script>
</body>
</html>
