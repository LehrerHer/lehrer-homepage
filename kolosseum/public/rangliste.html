<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gladiatorenrangliste – Lernkolosseum</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .page-header {
      text-align: center;
      padding: 2.5rem 0 1.5rem;
    }
    .page-header h1 { font-size: 2.2rem; color: var(--ink); }
    .page-header p  { color: var(--ink-soft); margin-top: 0.4rem; }

    .rangliste-wrap { margin-top: 1.5rem; }

    .rangliste-table { width: 100%; border-collapse: collapse; }
    .rangliste-table th {
      text-align: left;
      padding: 0.75rem 1rem;
      background: var(--ink);
      color: #fff;
      font-family: 'Fredoka One', sans-serif;
      font-size: 1rem;
    }
    .rangliste-table th:last-child,
    .rangliste-table td:last-child { text-align: right; }

    .rangliste-table td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
      font-size: 0.95rem;
    }
    .rangliste-table tr:hover td { background: var(--bg); }

    .rank-medal { font-size: 1.4rem; }
    .rank-num   { font-weight: 800; color: var(--ink-soft); }

    .nick-cell { font-weight: 700; }
    .nick-cell.me { color: var(--c1); }
    .nick-cell.me::after { content: ' ← Du'; font-size: 0.75rem; font-weight: 600; }

    .xp-cell {
      font-family: 'Fredoka One', sans-serif;
      font-size: 1.1rem;
      color: var(--c3);
    }

    .level-chip {
      display: inline-block;
      background: var(--bg);
      border-radius: 50px;
      padding: 0.2rem 0.7rem;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--ink-soft);
    }

    .empty { text-align: center; padding: 3rem; color: var(--ink-soft); }

    /* Herausfordern-Button */
    .btn-challenge {
      padding: .3rem .85rem;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: .78rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: var(--c1);
      color: #fff;
      transition: transform .2s, opacity .2s;
      white-space: nowrap;
    }
    .btn-challenge:hover  { transform: translateY(-1px); }
    .btn-challenge:disabled { opacity: .45; cursor: default; transform: none; }
    .btn-challenge.gesendet { background: var(--c3); }

    @media (max-width: 600px) {
      .rangliste-table th:nth-child(3),
      .rangliste-table td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

  <nav class="site-navbar" role="navigation" aria-label="Hauptnavigation">
    <div class="site-nav-inner">
      <a href="https://lehrer-herrmann.de" class="site-nav-logo">Jan <span>Herrmann</span></a>
      <button class="site-hamburger" id="site-hamburger" aria-label="Menü öffnen" aria-expanded="false" aria-controls="site-nav-links">
        <span></span><span></span><span></span>
      </button>
      <ul class="site-nav-links" id="site-nav-links" role="list">
        <li><a href="https://lehrer-herrmann.de/#faecher">Fächer</a></li>
        <li><a href="https://lehrer-herrmann.de/portal.html">Materialien &amp; Quizze</a></li>
        <li><a href="/profil.html" class="aktiv">🏛️ Arena</a></li>
        <li><a href="https://lehrer-herrmann.de/blog.html">Blog</a></li>
        <li><a href="https://lehrer-herrmann.de/kontakt.html">Kontakt</a></li>
      </ul>
    </div>
  </nav>

  <nav class="kolosseum-subnav" aria-label="Arena-Navigation">
    <div class="kolosseum-subnav-inner">
      <span class="subnav-brand">🏛️ Lernkolosseum</span>
      <div class="subnav-links">
        <a href="/profil.html">Profil</a>
        <a href="/rangliste.html" class="active">Rangliste</a>
        <a href="/quiz.html">Quizze</a>
        <a href="/charakter.html">Charakter</a>
        <button id="logout-btn" class="subnav-logout">Ausloggen</button>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-bottom: 3rem;">

    <div class="page-header">
      <h1>🏆 Gladiatorenrangliste</h1>
      <p>Die stärksten Gladiatoren im Kolosseum</p>
    </div>

    <div class="card rangliste-wrap">
      <table class="rangliste-table" id="rangliste-table">
        <thead>
          <tr>
            <th style="width:60px">#</th>
            <th>Held</th>
            <th>Level</th>
            <th>Abzeichen</th>
            <th>XP</th>
            <th style="width:120px"></th>
          </tr>
        </thead>
        <tbody id="rangliste-body">
          <tr><td colspan="5" class="empty">Wird geladen…</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <script src="/js/avatar.js"></script>
  <script>
    (function () {
      const MEDALS = ['🥇', '🥈', '🥉'];

      async function init() {
        const meRes = await fetch('/api/auth/me');
        if (!meRes.ok) { window.location.href = '/login.html'; return; }
        const me = await meRes.json();

        const res = await fetch('/api/students/rangliste');
        if (!res.ok) return;
        const students = await res.json();

        const tbody = document.getElementById('rangliste-body');
        if (!students.length) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty">Noch keine Helden – seid die Ersten!</td></tr>';
          return;
        }

        tbody.innerHTML = students.map((s, i) => {
          const rank   = i + 1;
          const rankEl = rank <= 3 ? `<span class="rank-medal">${MEDALS[rank - 1]}</span>` : `<span class="rank-num">${rank}</span>`;
          const info   = getLevelInfo(s.xp);
          const isMe   = s.id === me.id;
          const challengeBtn = isMe
            ? '<td></td>'
            : `<td style="text-align:right"><button class="btn-challenge" data-id="${s.id}" data-nick="${escHtml(s.nick)}">⚔️ Herausfordern</button></td>`;
          return `
            <tr>
              <td>${rankEl}</td>
              <td><span class="nick-cell${isMe ? ' me' : ''}">${escHtml(s.nick)}</span></td>
              <td><span class="level-chip">${info.level.name}</span></td>
              <td style="text-align:center">${'🏅'.repeat(Math.min(s.badge_count, 5))}${s.badge_count > 5 ? ` +${s.badge_count - 5}` : s.badge_count === 0 ? '–' : ''}</td>
              <td class="xp-cell">${s.xp} XP</td>
              ${challengeBtn}
            </tr>
          `;
        }).join('');

        // Challenge-Buttons verknüpfen
        tbody.querySelectorAll('.btn-challenge').forEach(btn => {
          btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.textContent = '⏳';
            const r = await fetch('/api/arena/herausforderung', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ gegnerId: Number(btn.dataset.id) }),
            });
            if (r.ok) {
              btn.textContent = '✅ Gesendet!';
              btn.classList.add('gesendet');
            } else {
              const err = await r.json().catch(() => ({}));
              btn.textContent = '⚠️ ' + (err.error || 'Fehler');
              btn.disabled = false;
            }
          });
        });
      }

      function escHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.href = '/login.html';
      });

      init().catch(console.error);
    })();
  </script>
  <script src="/js/arena-bar.js"></script>
  <script src="/js/site-nav.js"></script>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <p>© <span id="footer-jahr">2026</span> Jan Herrmann</p>
      <nav class="site-footer-links" aria-label="Rechtliche Links">
        <a href="https://lehrer-herrmann.de/impressum.html">Impressum</a>
        <a href="https://lehrer-herrmann.de/datenschutz.html">Datenschutz</a>
      </nav>
    </div>
  </footer>
</body>
</html>
