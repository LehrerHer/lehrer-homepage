<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lernkolosseum – Anmelden</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--ink) 0%, #2d2d5e 100%);
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo .trophy { font-size: 4rem; display: block; margin-bottom: 0.5rem; }
    .login-logo h1 {
      font-family: 'Fredoka One', sans-serif;
      font-size: 2.2rem;
      color: var(--c2);
      letter-spacing: 0.02em;
    }
    .login-logo p { color: rgba(255,255,255,0.6); font-size: 0.95rem; margin-top: 0.25rem; }

    .login-card { background: var(--card); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow-lg); }

    .btn-login {
      width: 100%;
      padding: 1rem;
      font-size: 1.1rem;
      margin-top: 0.5rem;
    }

    .hint {
      font-size: 0.82rem;
      color: var(--ink-soft);
      margin-top: 0.25rem;
    }

    .bottom-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color var(--transition);
    }
    .bottom-link:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <span class="trophy">🏛️</span>
      <h1>Lernkolosseum</h1>
      <p>Betritt die Arena. Dein Gladiator wartet.</p>
    </div>

    <div class="login-card">
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="identifier">E-Mail oder Avatarname</label>
          <input
            type="text"
            id="identifier"
            name="identifier"
            placeholder="deine@email.de oder Avatarname"
            autocomplete="username"
            autocapitalize="none"
            required
          >
          <div class="hint">Du kannst dich mit deiner E-Mail-Adresse oder deinem Avatarnamen anmelden.</div>
        </div>

        <div class="form-group">
          <label for="password">Passwort</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Dein Passwort"
            autocomplete="current-password"
            required
          >
        </div>

        <div class="form-error" id="login-error" role="alert" aria-live="polite"></div>

        <button type="submit" class="btn btn-primary btn-login" id="login-btn">
          Einloggen ⚔️
        </button>
      </form>
    </div>

    <a href="/register.html" class="bottom-link" style="color:rgba(255,255,255,0.65);font-size:1rem;margin-top:1rem">
      Noch kein Gladiator? Jetzt registrieren →
    </a>
    <a href="/admin/index.html" class="bottom-link">Admin-Bereich</a>
  </div>

  <script>
    (function () {
      'use strict';

      const form    = document.getElementById('login-form');
      const errorEl = document.getElementById('login-error');
      const btn     = document.getElementById('login-btn');

      // ?next – Rücksprung zur Ausgangsseite nach dem Login
      // Nur lehrer-herrmann.de und localhost erlaubt (kein Open-Redirect)
      const nextParam = new URLSearchParams(location.search).get('next') || '';
      function safeNext(fallback) {
        try {
          const u = new URL(nextParam);
          if (u.hostname === 'lehrer-herrmann.de' || u.hostname === 'localhost' || u.hostname === '127.0.0.1') {
            return nextParam;
          }
        } catch {}
        return fallback;
      }
      const afterLoginUrl = safeNext('https://lehrer-herrmann.de/portal.html');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.textContent = '';
        btn.disabled        = true;
        btn.textContent     = '…';

        const identifier = document.getElementById('identifier').value.trim();
        const password   = document.getElementById('password').value;

        if (!identifier || !password) {
          errorEl.textContent = 'Bitte E-Mail/Avatarname und Passwort eingeben.';
          btn.disabled    = false;
          btn.textContent = 'Einloggen ⚔️';
          return;
        }

        try {
          const res  = await fetch('/api/auth/login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ identifier, password }),
          });
          const data = await res.json();

          if (!res.ok) {
            errorEl.textContent = data.error || 'Anmeldung fehlgeschlagen.';
            btn.disabled    = false;
            btn.textContent = 'Einloggen ⚔️';
            return;
          }

          window.location.href = afterLoginUrl;
        } catch {
          errorEl.textContent = 'Verbindungsfehler. Bitte erneut versuchen.';
          btn.disabled    = false;
          btn.textContent = 'Einloggen ⚔️';
        }
      });

      // Bereits eingeloggt?
      fetch('/api/auth/me').then(r => { if (r.ok) window.location.href = '/profil.html'; });
    })();
  </script>
  <script src="/js/arena-bar.js"></script>
</body>
</html>
