<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin-Login – Lernkolosseum</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--ink);
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      padding: 2.5rem 2rem;
    }

    .admin-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .admin-logo .icon { font-size: 3rem; display: block; }
    .admin-logo h1 {
      font-family: 'Fredoka One', sans-serif;
      font-size: 1.6rem;
      color: var(--ink);
      margin-top: 0.5rem;
    }
    .admin-logo p {
      color: var(--ink-soft);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>

  <div class="card login-card">
    <div class="admin-logo">
      <span class="icon">⚙️</span>
      <h1>Admin-Bereich</h1>
      <p>Lernkolosseum</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password"
               placeholder="Admin-Passwort" autocomplete="current-password" required>
      </div>
      <div class="form-error" id="error-msg" aria-live="polite"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.75rem" id="submit-btn">
        Anmelden
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem">
      <a href="/login.html" style="color:var(--ink-soft);font-size:0.85rem;text-decoration:none">
        ← Schüler-Login
      </a>
    </div>
  </div>

  <script>
    (function () {
      // Bereits eingeloggt? Weiterleiten.
      fetch('/api/auth/admin/check').then((r) => {
        if (r.ok) window.location.href = '/admin/dashboard.html';
      });

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const err = document.getElementById('error-msg');
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.textContent = 'Prüfe…';
        err.textContent = '';

        try {
          const res = await fetch('/api/auth/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
          });
          const data = await res.json();

          if (res.ok) {
            window.location.href = data.redirect || '/admin/dashboard.html';
          } else {
            err.textContent = data.error || 'Anmeldung fehlgeschlagen.';
            btn.disabled = false;
            btn.textContent = 'Anmelden';
          }
        } catch {
          err.textContent = 'Netzwerkfehler – bitte erneut versuchen.';
          btn.disabled = false;
          btn.textContent = 'Anmelden';
        }
      });
    })();
  </script>
</body>
</html>
