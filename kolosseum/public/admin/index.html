<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Lernkolosseum</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    .login-wrap { width: 100%; max-width: 380px; padding: 1rem; }
    .login-logo { text-align: center; margin-bottom: 1.75rem; }
    .login-logo span { font-size: 3rem; display: block; }
    .login-logo h1 { font-family: 'Fredoka One', sans-serif; font-size: 1.8rem; color: var(--c2); }
    .login-logo p  { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 0.2rem; }
    .btn-login { width: 100%; margin-top: 0.5rem; }
    .back-link {
      display: block; text-align: center; margin-top: 1.25rem;
      color: rgba(255,255,255,0.35); font-size: 0.85rem; text-decoration: none;
      transition: color var(--transition);
    }
    .back-link:hover { color: rgba(255,255,255,0.65); }
  </style>
</head>
<body>

  <nav class="navbar" role="navigation" aria-label="Hauptnavigation">
    <div class="container navbar-inner">
      <a href="https://lehrer-herrmann.de" class="navbar-logo">lehrer-herrmann.de</a>
      <button class="hamburger" id="hamburger" aria-label="Menü öffnen" aria-expanded="false" aria-controls="navbar-links">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar-links" id="navbar-links">
        <li><a href="https://lehrer-herrmann.de/#was-ist-neu">Was ist neu?</a></li>
        <li><a href="https://lehrer-herrmann.de/kontakt.html">Kontakt</a></li>
        <li class="navbar-gb-trenner" aria-hidden="true"><span class="navbar-gb-label">Geschützter Bereich</span></li>
        <li><a href="/profil.html" class="navbar-gb-link">⚔️ Arena</a></li>
        <li><a href="https://lehrer-herrmann.de/blog.html" class="navbar-gb-link">✍️ Blog</a></li>
        <li><a href="https://lehrer-herrmann.de/faecher.html" class="navbar-gb-link">📚 Fächer</a></li>
      </ul>
      <div id="kolosseum-widget" aria-label="Kolosseum-Anmeldung" style="display:none"></div>
    </div>
  </nav>

  <div class="login-wrap">
    <div class="login-logo">
      <span>⚙️</span>
      <h1>Admin-Bereich</h1>
      <p>Lernkolosseum</p>
    </div>
    <div class="card">
      <form id="admin-form" novalidate>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" name="password" placeholder="Admin-Passwort" required autocomplete="current-password">
        </div>
        <div class="form-error" id="error-msg" role="alert" aria-live="polite"></div>
        <button type="submit" class="btn btn-primary btn-login" id="login-btn">Einloggen</button>
      </form>
    </div>
    <a href="/login.html" class="back-link">← Zur Schüler-Anmeldung</a>
  </div>

  <script>
    // Bereits eingeloggt? Weiterleiten.
    fetch('/api/auth/admin/check').then(r => {
      if (r.ok) window.location.href = '/admin/dashboard.html';
    });

    const form   = document.getElementById('admin-form');
    const errEl  = document.getElementById('error-msg');
    const btn    = document.getElementById('login-btn');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errEl.textContent = '';
      btn.disabled = true; btn.textContent = '…';

      const password = document.getElementById('password').value;
      try {
        const res  = await fetch('/api/auth/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error; btn.disabled = false; btn.textContent = 'Einloggen'; return; }
        window.location.href = data.redirect || '/admin/dashboard.html';
      } catch {
        errEl.textContent = 'Verbindungsfehler.';
        btn.disabled = false; btn.textContent = 'Einloggen';
      }
    });
  </script>
</body>
</html>
