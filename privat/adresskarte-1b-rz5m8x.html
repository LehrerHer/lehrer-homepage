<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Adressliste Klasse 1b 2025</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #f4f1eb;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: #1c3a2f;
  color: #f4f1eb;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem;
  letter-spacing: 0.01em;
}

header .badge {
  background: #4a8c6f;
  color: #f4f1eb;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

header .count {
  margin-left: auto;
  font-size: 0.85rem;
  opacity: 0.7;
}

.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#sidebar {
  width: 260px;
  flex-shrink: 0;
  background: #fff;
  overflow-y: auto;
  border-right: 1px solid #e0dbd0;
}

.sidebar-header {
  padding: 12px 16px;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #888;
  border-bottom: 1px solid #e0dbd0;
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 1;
}

.student-item {
  padding: 10px 16px;
  border-bottom: 1px solid #f0ece4;
  cursor: pointer;
  transition: background 0.15s;
}

.student-item:hover {
  background: #f4f1eb;
}

.student-item.active {
  background: #e8f2ec;
  border-left: 3px solid #1c3a2f;
}

.student-name {
  font-weight: 600;
  font-size: 0.88rem;
  color: #1a1a1a;
}

.student-addr {
  font-size: 0.75rem;
  color: #777;
  margin-top: 2px;
}

#map {
  flex: 1;
}

.leaflet-popup-content-wrapper {
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  font-family: 'DM Sans', sans-serif;
}

.popup-name {
  font-weight: 600;
  font-size: 0.95rem;
  color: #1c3a2f;
  margin-bottom: 4px;
}

.popup-addr {
  font-size: 0.82rem;
  color: #555;
  margin-bottom: 4px;
}

.popup-tel {
  font-size: 0.8rem;
  color: #888;
}
</style>
</head>
<body>

<header>
  <h1>Klasse 1b · 2025</h1>
  <span class="badge">Adresskarte</span>
  <span class="count">22 Schülerinnen &amp; Schüler</span>
</header>

<div class="layout">
  <div id="sidebar">
    <div class="sidebar-header">Alphabetisch</div>
  </div>
  <div id="map"></div>
</div>

<script>
const students = [
  { name: "Ahmed, Ulfat",          addr: "Am Töpferhof 10",              tel: "0163/5691884",                             lat: 52.2595752, lng: 7.996444  },
  { name: "Baumbach, Max",         addr: "Hörner Weg 72",                tel: "",                                         lat: 52.252973,  lng: 8.0078371 },
  { name: "Bente, Mila",           addr: "Grieseling 10",                tel: "0176/83049919",                            lat: 52.2619554, lng: 7.998353  },
  { name: "Bosenko, Aleksej",      addr: "Lärchenweg 16, Hasbergen",     tel: "0172/2937969",                             lat: 52.2380245, lng: 7.9754127 },
  { name: "Büter, Amelie",         addr: "Grieseling 14",                tel: "0176/84649171",                            lat: 52.2621544, lng: 7.9947531 },
  { name: "Dietze, Matteo",        addr: "Kleine Schulstraße 1a",        tel: "0174/9340667 · 0170/9166698",              lat: 52.2572115, lng: 7.9944236 },
  { name: "Dörjes, Giulio",        addr: "Töpferstraße 7",               tel: "0173/7035666",                             lat: 52.2600647, lng: 7.9954147 },
  { name: "El Ouahni, Adam",       addr: "Im Grauen Tal 20",             tel: "0157/85030453",                            lat: 52.2590,    lng: 7.993     },
  { name: "Frankenberg, Karlsson", addr: "Lengericher Landstraße 38a",   tel: "0174/9378707 · 0162/8213791",              lat: 52.2539853, lng: 7.9879739 },
  { name: "Frense, Eva",           addr: "Westfalenhof 14",              tel: "0176/81855022 · 0541/20079119",            lat: 52.2552013, lng: 7.9996042 },
  { name: "Funke, Linda",          addr: "Maiweg 11",                    tel: "0541/7505326 · 0175/1547204",              lat: 52.2665868, lng: 7.9836476 },
  { name: "Hehemann, Wilma",       addr: "Lobbertkamp 1a",               tel: "0171/9558123",                             lat: 52.2441968, lng: 7.9863    },
  { name: "Herrmann, Lorenz",      addr: "Lipper Kamp 2",                tel: "0170/7384402",                             lat: 52.255557,  lng: 7.9936087 },
  { name: "Justus, Mia",           addr: "Hasberger Weg 12a",            tel: "0174/4967535 · 0176/22176250",             lat: 52.2502262, lng: 7.9717004 },
  { name: "Kather, Erik",          addr: "Vor dem Wiggert 14",           tel: "0179/9945600 · 0173/5274254",              lat: 52.2556683, lng: 7.9855365 },
  { name: "Lorenz, Sydney",        addr: "Holunderweg 8, Hasbergen",     tel: "0171/4124378 · 0171/1402329",              lat: 52.2581406, lng: 7.9512682 },
  { name: "Mohamed, Maryam",       addr: "Am Lünsenbrink 17",            tel: "0176/24960969",                            lat: 52.2678861, lng: 7.9839998 },
  { name: "Ossovski, Gabriela",    addr: "An der Lauburg 2",             tel: "0151/28876134",                            lat: 52.265311,  lng: 7.9834779 },
  { name: "Pylypaka, Artem",       addr: "Große Schulstraße 68",         tel: "0380980835955 (WhatsApp) · 0151/55646608", lat: 52.2676696, lng: 7.9820613 },
  { name: "Ressel, Malik",         addr: "Am Ehrenhain 3, Hasbergen",    tel: "0178/3019423",                             lat: 52.2562549, lng: 7.9483173 },
  { name: "Tebbe, Louisa",         addr: "Friesenhof 15",                tel: "0176/61260794 · 0541/5806607",             lat: 52.256051,  lng: 7.9994119 },
  { name: "Thünemann, Clara",      addr: "Hasberger Weg 16",             tel: "0175/1632782 · 0176/99087295",             lat: 52.249974,  lng: 7.9712458 },
];

const map = L.map('map').setView([52.257, 7.985], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

const greenIcon = L.divIcon({
  className: '',
  html: `<div style="width:14px;height:14px;background:#1c3a2f;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`,
  iconSize: [14, 14], iconAnchor: [7, 7]
});

const sidebar = document.getElementById('sidebar');
const markers = [];

students.forEach((s, i) => {
  const marker = L.marker([s.lat, s.lng], { icon: greenIcon }).addTo(map);

  const popupHtml = `
    <div>
      <div class="popup-name">${s.name}</div>
      <div class="popup-addr">${s.addr}</div>
      ${s.tel ? `<div class="popup-tel">📞 ${s.tel}</div>` : ''}
    </div>`;
  marker.bindPopup(popupHtml);
  markers.push(marker);

  const item = document.createElement('div');
  item.className = 'student-item';
  item.innerHTML = `
    <div class="student-name">${s.name}</div>
    <div class="student-addr">${s.addr}</div>`;
  item.addEventListener('click', () => {
    map.setView([s.lat, s.lng], 16);
    marker.openPopup();
    document.querySelectorAll('.student-item').forEach(el => el.classList.remove('active'));
    item.classList.add('active');
  });
  sidebar.appendChild(item);

  marker.on('click', () => {
    document.querySelectorAll('.student-item').forEach(el => el.classList.remove('active'));
    item.classList.add('active');
    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
});
</script>

</body>
</html>
