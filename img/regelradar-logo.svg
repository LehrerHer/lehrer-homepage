<?xml version="1.0" encoding="UTF-8"?>
<!-- Platzhalter-Logo für RegelRadar. Kann unter gleichem Pfad durch das finale Logo ersetzt werden. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="RegelRadar">
  <defs>
    <linearGradient id="rr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a5f"/>
      <stop offset="1" stop-color="#2d6a9f"/>
    </linearGradient>
    <radialGradient id="rr-sweep" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e0a32e" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#e0a32e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#rr-bg)"/>
  <g fill="none" stroke="#4a9eda" stroke-width="1.6" opacity="0.55">
    <circle cx="32" cy="32" r="20"/>
    <circle cx="32" cy="32" r="13"/>
    <circle cx="32" cy="32" r="6"/>
  </g>
  <!-- Radar-Sweep -->
  <path d="M32 32 L32 11 A21 21 0 0 1 50 22 Z" fill="url(#rr-sweep)"/>
  <line x1="32" y1="32" x2="32" y2="11" stroke="#e0a32e" stroke-width="2" stroke-linecap="round"/>
  <!-- Treffer-Punkt = korrekt erkannt -->
  <circle cx="42" cy="24" r="3" fill="#2ecc71"/>
  <circle cx="32" cy="32" r="2.4" fill="#e0a32e"/>
</svg>
